name: Agent Kit Release

# On a catalog release tag (e.g. agents-v1.0.0), run the full gate, build the
# wire-shape catalog.json, sign it (HSM-backed, gated), verify the signature
# against the pinned public key, and publish the artifacts to a GitHub Release.
on:
  push:
    tags:
      - "agents-v*"

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC federation to Azure Key Vault when signing is enabled

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CATALOG_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate recipes
        run: |
          . .venv/bin/activate
          for recipe in source/agents/*/recipe.yaml; do
            endor-agent-kit validate "$recipe"
            endor-agent-kit authoring-check "$recipe"
          done

      - name: Test
        run: .venv/bin/python -m pytest -q

      - name: Regenerate catalog
        run: |
          . .venv/bin/activate
          endor-agent-kit publish source/agents/*/recipe.yaml --dest . --prune --include-plugins

      - name: Check generated catalog drift
        run: |
          git diff --exit-code -- \
            README.md \
            manifest.json \
            catalog.json \
            .agents/plugins \
            .claude-plugin \
            .cursor-plugin \
            agents \
            assets \
            claude-code \
            claude-managed-agents \
            codex \
            cursor-sdk \
            gemini \
            hooks \
            plugins \
            portable \
            skills

      - name: Check guardrails and provenance
        run: |
          . .venv/bin/activate
          endor-agent-kit check-guardrails --catalog-root .
          endor-agent-kit verify-provenance --catalog-root .

      - name: Stamp catalog_version
        run: |
          . .venv/bin/activate
          endor-agent-kit stamp-catalog-version --catalog catalog.json --catalog-version "$CATALOG_TAG"

      # --- Signing (gated until the Azure Key Vault key + OIDC federation land; AI-418) ---
      - name: Azure login (OIDC)
        if: ${{ vars.CATALOG_SIGNING_ENABLED == 'true' }}
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.CATALOG_SIGNING_AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.CATALOG_SIGNING_AZURE_TENANT_ID }}
          subscription-id: ${{ vars.CATALOG_SIGNING_AZURE_SUBSCRIPTION_ID }}

      - name: Sign catalog.json (Azure Key Vault, ES256)
        if: ${{ vars.CATALOG_SIGNING_ENABLED == 'true' }}
        env:
          CATALOG_SIGNING_VAULT: ${{ vars.CATALOG_SIGNING_VAULT }}
          CATALOG_SIGNING_KEY: ${{ vars.CATALOG_SIGNING_KEY }}
        run: |
          . .venv/bin/activate
          bash scripts/sign_catalog_akv.sh catalog.json catalog.json.sig

      - name: Verify signature against pinned public key
        if: ${{ vars.CATALOG_SIGNING_ENABLED == 'true' }}
        run: |
          . .venv/bin/activate
          endor-agent-kit verify-catalog-signature \
            --catalog catalog.json \
            --signature catalog.json.sig \
            --public-key keys/catalog-signing-public-key.pem

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets="catalog.json"
          if [ -f catalog.json.sig ]; then
            assets="$assets catalog.json.sig keys/catalog-signing-public-key.pem"
          else
            echo "::warning title=Unsigned catalog::CATALOG_SIGNING_ENABLED is not 'true'; publishing catalog.json without a signature (see AI-418)."
          fi
          # shellcheck disable=SC2086
          gh release create "$CATALOG_TAG" $assets \
            --title "$CATALOG_TAG" \
            --notes "Endor agent catalog for ${CATALOG_TAG}. Wire shape: internal.endor.ai/endor/v1 EndorAgent."
