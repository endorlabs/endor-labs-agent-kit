name: Publish ai-plugins PR

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-ai-plugins-pr.yml"
      - "assets/**"
      - "pyproject.toml"
      - "scripts/sync_ai_plugins_distribution.py"
      - "source/agents/**"
      - "source/plugin-support/**"
      - "src/endor_agent_kit/**"
      - "tests/**"
  workflow_dispatch:
    inputs:
      ai_plugins_repository:
        description: "Repository to receive the generated distribution PR"
        required: true
        default: "endorlabs/ai-plugins"
      ai_plugins_base_branch:
        description: "Base branch in the ai-plugins repository"
        required: true
        default: "main"
      dry_run:
        description: "Validate and build the mirror diff without pushing a PR"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  AI_PLUGINS_REPOSITORY: ${{ github.event.inputs.ai_plugins_repository || 'endorlabs/ai-plugins' }}
  AI_PLUGINS_BASE_BRANCH: ${{ github.event.inputs.ai_plugins_base_branch || 'main' }}
  DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
  ENDOR_ARTIFACT_NAME_PREFIX: ${{ vars.ENDOR_ARTIFACT_NAME_PREFIX }}

jobs:
  publish-ai-plugins-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Agent Kit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: endor-labs-agent-kit
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.10"

      - name: Install Agent Kit
        working-directory: endor-labs-agent-kit
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate source recipes
        working-directory: endor-labs-agent-kit
        run: |
          . .venv/bin/activate
          for recipe in source/agents/*/recipe.yaml; do
            endor-agent-kit validate "$recipe"
            endor-agent-kit authoring-check "$recipe"
          done

      - name: Validate newly added agents strictly
        if: ${{ github.event_name == 'pull_request' }}
        working-directory: endor-labs-agent-kit
        run: |
          . .venv/bin/activate
          python scripts/check_new_agent_authoring.py \
            --base-ref "origin/${{ github.base_ref }}" \
            --command endor-agent-kit

      - name: Test Agent Kit
        working-directory: endor-labs-agent-kit
        run: .venv/bin/python -m pytest -q

      - name: Regenerate catalog
        working-directory: endor-labs-agent-kit
        run: |
          . .venv/bin/activate
          endor-agent-kit publish source/agents/*/recipe.yaml --dest . --prune --include-plugins

      - name: Check generated catalog drift
        working-directory: endor-labs-agent-kit
        run: |
          git diff --exit-code -- \
            README.md \
            manifest.json \
            .agents/plugins \
            .claude-plugin \
            .cursor-plugin \
            agents \
            assets \
            claude-code \
            claude-managed-agents \
            codex \
            cursor-sdk \
            gemini \
            hooks \
            plugins \
            portable \
            skills

      - name: Check guardrails and provenance
        working-directory: endor-labs-agent-kit
        run: |
          . .venv/bin/activate
          endor-agent-kit check-guardrails --catalog-root .
          endor-agent-kit verify-provenance --catalog-root .

      - name: Build provenance bundle
        id: provenance
        working-directory: endor-labs-agent-kit
        run: |
          . .venv/bin/activate
          mkdir -p dist/provenance
          endor-agent-kit provenance-statement --catalog-root . > dist/provenance/agent-kit-catalog.intoto.json
          sha256sum manifest.json > dist/provenance/manifest.sha256
          python scripts/build_provenance_bundle.py \
            --root . \
            --output dist/agent-kit-catalog-provenance.tgz
          provenance_sha="$(sha256sum dist/agent-kit-catalog-provenance.tgz | awk '{print $1}')"
          manifest_sha="$(sha256sum manifest.json | awk '{print $1}')"
          artifact_prefix="${ENDOR_ARTIFACT_NAME_PREFIX:-github.com/endorlabs/ai-plugins/agent-kit-catalog-provenance}"
          echo "sha256=$provenance_sha" >> "$GITHUB_OUTPUT"
          echo "manifest_sha=$manifest_sha" >> "$GITHUB_OUTPUT"
          echo "ENDOR_AGENT_KIT_ARTIFACT_NAME=${artifact_prefix}@sha256:${provenance_sha}" >> "$GITHUB_ENV"

      - name: Optional Endor Labs artifact signing
        if: ${{ vars.ENDOR_ARTIFACT_SIGNING_ENABLED == 'true' && env.DRY_RUN != 'true' }}
        uses: endorlabs/github-action/sign@b8992820cc4d9c9e7ded5022adf6cabe2dc11946 # v1.1.12
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}
          artifact_name: ${{ env.ENDOR_AGENT_KIT_ARTIFACT_NAME }}

      - name: Optional Endor Labs artifact signature verification
        if: ${{ vars.ENDOR_ARTIFACT_SIGNING_ENABLED == 'true' && env.DRY_RUN != 'true' }}
        uses: endorlabs/github-action/verify@b8992820cc4d9c9e7ded5022adf6cabe2dc11946 # v1.1.12
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}
          artifact_name: ${{ env.ENDOR_AGENT_KIT_ARTIFACT_NAME }}
          certificate_oidc_issuer: "https://token.actions.githubusercontent.com"

      - name: Check ai-plugins sync token
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          AI_PLUGINS_SYNC_TOKEN: ${{ secrets.AI_PLUGINS_SYNC_TOKEN }}
        run: |
          if [ -z "${AI_PLUGINS_SYNC_TOKEN:-}" ]; then
            echo "AI_PLUGINS_SYNC_TOKEN must have contents:write and pull-requests:write on ${AI_PLUGINS_REPOSITORY}."
            exit 1
          fi

      - name: Check out ai-plugins
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ env.AI_PLUGINS_REPOSITORY }}
          ref: ${{ env.AI_PLUGINS_BASE_BRANCH }}
          path: ai-plugins
          token: ${{ secrets.AI_PLUGINS_SYNC_TOKEN }}

      - name: Sync generated distribution
        run: |
          python endor-labs-agent-kit/scripts/sync_ai_plugins_distribution.py \
            --source endor-labs-agent-kit \
            --target ai-plugins
          mkdir -p ai-plugins/provenance
          cp endor-labs-agent-kit/dist/provenance/agent-kit-catalog.intoto.json \
            ai-plugins/provenance/agent-kit-catalog.intoto.json
          cp endor-labs-agent-kit/dist/provenance/manifest.sha256 \
            ai-plugins/provenance/manifest.sha256
          cat > ai-plugins/provenance/README.md <<'EOF'
          # Agent Kit Catalog Provenance

          This directory is generated by the `endor-labs-agent-kit` publish workflow.

          - `agent-kit-catalog.intoto.json` is the deterministic in-toto/SLSA-style
            statement emitted by `endor-agent-kit provenance-statement`.
          - `manifest.sha256` records the checksum of the Agent Kit `manifest.json`
            that anchors all generated artifact checksums.

          Do not edit these files by hand. Update Agent Kit source, regenerate,
          and let the publish workflow open a new distribution PR.
          EOF

      - name: Validate ai-plugins mirror
        working-directory: ai-plugins
        run: |
          set -e
          for skill in skills/*; do
            ../endor-labs-agent-kit/.venv/bin/python scripts/quick_validate.py "$skill"
          done
          python3 -m json.tool .claude-plugin/marketplace.json >/dev/null
          python3 -m json.tool .agents/plugins/marketplace.json >/dev/null
          python3 -m json.tool .cursor-plugin/marketplace.json >/dev/null
          python3 -m json.tool .cursor-plugin/plugin.json >/dev/null
          python3 -m json.tool cursor-sdk/agent_definitions.json >/dev/null
          python3 -m json.tool hooks/hooks.json >/dev/null
          python3 -m json.tool plugins/claude/endor-labs-agent-kit/hooks/hooks.json >/dev/null
          python3 -m json.tool plugins/codex/endor-labs-agent-kit/hooks/hooks.json >/dev/null
          python3 -m json.tool plugins/gemini/endor-labs-agent-kit/hooks/hooks.json >/dev/null
          python3 -m json.tool plugins/antigravity/endor-labs-agent-kit/hooks.json >/dev/null
          shopt -s nullglob
          for hook_script in hooks/*.sh plugins/*/*/hooks/*.sh; do
            bash -n "$hook_script"
          done
          shopt -u nullglob
          python3 - <<'PY'
          import py_compile

          py_compile.compile("cursor-sdk/run_cursor_agent.py", cfile="/tmp/run_cursor_agent.pyc", doraise=True)
          PY
          python3 - <<'PY'
          import json
          import pathlib
          import sys

          manifest = json.loads(pathlib.Path(".cursor-plugin/plugin.json").read_text(encoding="utf-8"))
          missing = sorted(
              value
              for value in manifest.values()
              if isinstance(value, str) and value.startswith("./") and not pathlib.Path(value).exists()
          )
          if missing:
              print(f"dangling .cursor-plugin/plugin.json references: {missing}")
              sys.exit(1)
          PY
          test -f plugins/gemini/endor-labs-agent-kit/gemini-extension.json
          test ! -e plugins/gemini/endor-labs-agent-kit.zip
          diff -qr ../endor-labs-agent-kit/plugins ./plugins
          diff -qr ../endor-labs-agent-kit/.cursor-plugin ./.cursor-plugin
          diff -qr ../endor-labs-agent-kit/agents ./agents
          diff -qr ../endor-labs-agent-kit/cursor-sdk ./cursor-sdk
          diff -qr ../endor-labs-agent-kit/hooks ./hooks
          for source_skill in ../endor-labs-agent-kit/skills/*/; do
            skill_name="$(basename "$source_skill")"
            if [ "$skill_name" = "create-endor-labs-agent" ]; then
              continue
            fi
            diff -qr "../endor-labs-agent-kit/skills/$skill_name" "skills/$skill_name"
          done
          diff -q ../endor-labs-agent-kit/assets/logo.png assets/logo.png
          git diff --check

      - name: Write ai-plugins PR body
        run: |
          cat > ai-plugins-pr-body.md <<EOF
          ## Source

          Generated from \`${GITHUB_REPOSITORY}@${GITHUB_SHA}\` after Agent Kit CI validation.

          ## Validation

          - \`endor-agent-kit validate\` and \`authoring-check\` for every source recipe
          - \`python -m pytest -q\`
          - \`endor-agent-kit publish ... --include-plugins\`
          - \`endor-agent-kit check-guardrails --catalog-root .\`
          - \`endor-agent-kit verify-provenance --catalog-root .\`
          - ai-plugins root skill validation, JSON checks, Cursor SDK compile check, Gemini no-zip check, and byte-for-byte generated-surface diffs

          ## Provenance

          - Manifest SHA256: \`${{ steps.provenance.outputs.manifest_sha }}\`
          - Provenance bundle SHA256: \`${{ steps.provenance.outputs.sha256 }}\`
          - Attestable artifact name: \`${ENDOR_AGENT_KIT_ARTIFACT_NAME}\`
          - Endor Labs signing: enabled only when \`ENDOR_ARTIFACT_SIGNING_ENABLED=true\` and \`ENDOR_NAMESPACE\` repository variables are configured

          ## Maintainer Checks

          - [ ] Source Agent Kit PR was merged by a maintainer.
          - [ ] Generated distribution changes only mirror approved Agent Kit source.
          - [ ] New or changed agents include source recipe, instructions, eval coverage, and architecture diagram in Agent Kit.
          - [ ] No direct behavior edits were made in ai-plugins.
          EOF

      - name: Report dry-run diff
        if: ${{ env.DRY_RUN == 'true' }}
        working-directory: ai-plugins
        run: |
          git status --short
          git diff --stat

      - name: Open or update ai-plugins PR
        if: ${{ env.DRY_RUN != 'true' }}
        working-directory: ai-plugins
        env:
          GH_TOKEN: ${{ secrets.AI_PLUGINS_SYNC_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No ai-plugins changes to publish."
            exit 0
          fi

          branch="agent-kit-sync/${GITHUB_SHA:0:12}"
          git config user.name "endor-agent-kit-sync[bot]"
          git config user.email "endor-agent-kit-sync[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add -A
          git commit -m "Sync Agent Kit generated artifacts"
          git push --force-with-lease origin "$branch"

          title="Sync Agent Kit generated artifacts (${GITHUB_SHA:0:12})"
          if gh pr view "$branch" --repo "$AI_PLUGINS_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$branch" \
              --repo "$AI_PLUGINS_REPOSITORY" \
              --title "$title" \
              --body-file ../ai-plugins-pr-body.md
          else
            gh pr create \
              --repo "$AI_PLUGINS_REPOSITORY" \
              --base "$AI_PLUGINS_BASE_BRANCH" \
              --head "$branch" \
              --title "$title" \
              --body-file ../ai-plugins-pr-body.md
          fi
