name: Agent Kit CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: .venv/bin/python -m pytest -q

      - name: Validate recipes
        run: |
          . .venv/bin/activate
          for recipe in agents/*/recipe.yaml; do
            endor-agent-kit validate "$recipe"
          done

      - name: Regenerate catalog
        run: |
          . .venv/bin/activate
          endor-agent-kit publish agents/*/recipe.yaml --dest . --prune

      - name: Check generated artifacts
        run: |
          git diff --exit-code -- \
            README.md \
            manifest.json \
            claude-code \
            claude-managed-agents \
            github-copilot-plugin
