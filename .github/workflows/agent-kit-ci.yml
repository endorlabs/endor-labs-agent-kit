name: Agent Kit CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: .venv/bin/python -m pytest -q

      - name: Validate recipes
        run: |
          . .venv/bin/activate
          for recipe in source/agents/*/recipe.yaml; do
            endor-agent-kit validate "$recipe"
          done

      - name: Check source authoring
        run: |
          . .venv/bin/activate
          for recipe in source/agents/*/recipe.yaml; do
            endor-agent-kit authoring-check "$recipe"
          done

      - name: Check new agent authoring
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          . .venv/bin/activate
          python scripts/check_new_agent_authoring.py \
            --base-ref "origin/${{ github.base_ref }}" \
            --command endor-agent-kit

      - name: Regenerate catalog
        run: |
          . .venv/bin/activate
          endor-agent-kit publish source/agents/*/recipe.yaml --dest . --prune --include-plugins

      - name: Check generated artifacts
        run: |
          git diff --exit-code -- \
            README.md \
            manifest.json \
            .agents/plugins \
            .claude-plugin \
            .cursor-plugin \
            agents \
            assets \
            claude-code \
            claude-managed-agents \
            codex \
            cursor-sdk \
            gemini \
            plugins \
            portable \
            skills

      - name: Check guardrails
        run: |
          . .venv/bin/activate
          endor-agent-kit check-guardrails --catalog-root .

      - name: Verify provenance
        run: |
          . .venv/bin/activate
          endor-agent-kit verify-provenance --catalog-root .
