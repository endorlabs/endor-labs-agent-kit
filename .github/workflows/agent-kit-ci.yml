name: Agent Kit CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.10"

      - name: Install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: .venv/bin/python -m pytest -q

      - name: Validate recipes
        run: |
          . .venv/bin/activate
          for recipe in source/agents/*/recipe.yaml; do
            endor-agent-kit validate "$recipe"
          done

      - name: Check source authoring
        run: |
          . .venv/bin/activate
          for recipe in source/agents/*/recipe.yaml; do
            endor-agent-kit authoring-check "$recipe"
          done

      - name: Check Endor API registry
        run: |
          . .venv/bin/activate
          python scripts/generate_endor_api_registry.py --check --spec source/endor-context/openapiv2.swagger.json

      - name: Check new agent authoring
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          . .venv/bin/activate
          python scripts/check_new_agent_authoring.py \
            --base-ref "origin/${{ github.base_ref }}" \
            --command endor-agent-kit

      - name: Check agent id stability
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          . .venv/bin/activate
          endor-agent-kit check-id-stability --base-ref "origin/${{ github.base_ref }}"

      - name: Regenerate catalog
        run: |
          . .venv/bin/activate
          endor-agent-kit publish source/agents/*/recipe.yaml --dest . --prune --include-plugins

      - name: Check generated artifacts
        run: |
          git diff --exit-code -- \
            README.md \
            manifest.json \
            catalog.json \
            .agents/plugins \
            .claude-plugin \
            .cursor-plugin \
            agents \
            assets \
            claude-code \
            claude-managed-agents \
            codex \
            cursor-sdk \
            gemini \
            hooks \
            plugins \
            portable \
            skills

      - name: Check guardrails
        run: |
          . .venv/bin/activate
          endor-agent-kit check-guardrails --catalog-root .

      - name: Verify provenance
        run: |
          . .venv/bin/activate
          endor-agent-kit verify-provenance --catalog-root .

      - name: Verify Endor context freshness
        run: |
          . .venv/bin/activate
          endor-agent-kit verify-endor-context
          if endor-agent-kit verify-endor-context --upstream; then
            echo "Endor context pin matches upstream."
          else
            echo "::warning title=Endor context drift (non-blocking)::Upstream Endor OpenAPI/docs moved since source/endor-context/ was pinned. This is external drift, not caused by this commit. Run 'endor-agent-kit refresh-endor-context' locally, review per docs/maintainer-guide.md, and commit the refreshed pin through a normal signed PR."
            {
              echo "## Endor context drift detected (non-blocking)"
              echo ""
              echo "Upstream Endor OpenAPI/docs moved since \`source/endor-context/\` was pinned."
              echo "This is external drift, not a failure introduced by this commit."
              echo ""
              echo "To refresh the pin:"
              echo ""
              echo "1. Run \`endor-agent-kit refresh-endor-context\` locally from a clean Agent Kit checkout."
              echo "2. Review affected Source Recipes, Knowledge Pack query recipes, and setup guidance per \`docs/maintainer-guide.md\` (\"Refresh Endor API And Docs Context\")."
              echo "3. Commit the updated \`source/endor-context/\` pin files through the normal signed PR process."
              echo ""
              echo "The scheduled \`Refresh Endor context\` workflow reports this same drift and validates the refreshed pin, but it does not push branches or create PRs."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
