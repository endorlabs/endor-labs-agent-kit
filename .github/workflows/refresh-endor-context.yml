name: Refresh Endor context

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.10"

      - name: Install Agent Kit
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Refresh Endor context provenance
        run: |
          . .venv/bin/activate
          endor-agent-kit refresh-endor-context

      - name: Validate refreshed provenance
        run: |
          . .venv/bin/activate
          endor-agent-kit verify-endor-context --upstream
          python -m pytest -q tests/test_endor_context.py

      - name: Report manual refresh instructions
        run: |
          if git diff --quiet source/endor-context/provenance.json; then
            echo "Endor context provenance already matches upstream."
            {
              echo "## Endor context refresh"
              echo ""
              echo "Committed \`source/endor-context/provenance.json\` already matches upstream."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "::warning title=Manual Endor context refresh needed::Upstream Endor API/docs context changed. This workflow refreshed and validated the pin locally, but company policy does not allow GitHub Actions to create pull requests. Run the manual refresh steps in docs/maintainer-guide.md."

          {
            echo "## Manual Endor context refresh needed"
            echo ""
            echo "The workflow refreshed and validated \`source/endor-context/provenance.json\` in the runner, but did not push a branch or open a PR."
            echo "Company policy requires a human-authored branch, signed commit, and normal PR review for this refresh."
            echo ""
            echo "From a clean Agent Kit checkout, run:"
            echo ""
            echo "\`\`\`bash"
            echo "endor-agent-kit refresh-endor-context"
            echo "endor-agent-kit verify-endor-context --upstream"
            echo "python -m pytest -q tests/test_endor_context.py"
            echo "git diff -- source/endor-context/provenance.json"
            echo "\`\`\`"
            echo ""
            echo "Before opening the PR, review:"
            echo ""
            echo "- Source Recipes against the refreshed API surface"
            echo "- Knowledge Pack query recipes under \`source/endor-knowledge-pack/\`"
            echo "- Setup guidance in \`source/plugin-support/setup/setup.md\`"
            echo "- Release docs for removed or renamed endpoints and flags"
          } >> "$GITHUB_STEP_SUMMARY"

          git --no-pager diff -- source/endor-context/provenance.json
