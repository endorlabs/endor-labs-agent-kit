cases:
  - id: safe-package
    input:
      ecosystem: npm
      package_name: lodash
      version: 4.17.21
    expected:
      verdict: SAFE
      required_evidence:
        - no known vulnerabilities or no blocking risk in available signals
      data_gaps_allowed: true

  - id: vulnerable-usable
    input:
      ecosystem: npm
      package_name: lodash
      version: 4.17.20
    expected:
      verdict: SAFE_WITH_CONDITIONS
      required_evidence:
        - vulnerability evidence
        - fix or upgrade guidance when available
      data_gaps_allowed: true

  - id: critical-or-malware-blocked
    input:
      ecosystem: maven
      package_name: org.apache.logging.log4j:log4j-core
      version: 2.14.1
    expected:
      verdict: BLOCKED
      required_evidence:
        - critical vulnerability, CISA KEV, high EPSS, or malware evidence
      data_gaps_allowed: true

  - id: critical-not-recommended
    input:
      ecosystem: npm
      package_name: minimist
      version: 0.0.8
    expected:
      verdict: NOT_RECOMMENDED
      required_evidence:
        - critical vulnerability without known high EPSS or CISA KEV evidence
        - safer fixed version guidance when available
      data_gaps_allowed: true

  - id: degraded-unknown-package
    input:
      ecosystem: npm
      package_name: package-that-should-not-exist-endor-agent-kit
      version: 0.0.1
    expected:
      verdict: SAFE_WITH_CONDITIONS
      required_evidence:
        - unavailable or incomplete data must be named
        - do not fabricate package scores or license
      data_gaps_allowed: true
