cases:
  - id: reachable-project-findings
    input:
      project_uuid: 00000000-0000-0000-0000-000000000000
      filters:
        - reachable
    expected:
      summary_contains:
        - reachable findings
      required_evidence:
        - query Finding resources for FINDING_TAGS_REACHABLE_FUNCTION
        - distinguish function-level reachability from dependency-level reachability
      data_gaps_allowed: true

  - id: project-name-resolution
    input:
      project_name: app-java-demo
      filters:
        - high
        - critical
    expected:
      summary_contains:
        - project context
      required_evidence:
        - resolve project name before listing findings
        - ask for exact project when lookup is ambiguous or empty
      data_gaps_allowed: true

  - id: missing-project-context
    input:
      filters:
        - reachable
    expected:
      summary_contains:
        - project name or project UUID
      required_evidence:
        - do not guess from an arbitrary project
        - ask for project context when unavailable
      data_gaps_allowed: true
