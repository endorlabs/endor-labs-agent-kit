cases:
  - id: low-risk-package
    input:
      ecosystem: npm
      package_name: lodash
      version: 4.17.21
    expected:
      risk_posture: LOW
      required_evidence:
        - no meaningful risk found in available signals
      data_gaps_allowed: true

  - id: vulnerable-package
    input:
      ecosystem: npm
      package_name: lodash
      version: 4.17.20
    expected:
      risk_posture: MODERATE
      required_evidence:
        - vulnerability evidence
        - next checks or upgrade guidance when available
      data_gaps_allowed: true

  - id: critical-package
    input:
      ecosystem: maven
      package_name: org.apache.logging.log4j:log4j-core
      version: 2.14.1
    expected:
      risk_posture: CRITICAL
      required_evidence:
        - critical vulnerability, CISA KEV, high EPSS, known exploited, or malware evidence
      data_gaps_allowed: true

  - id: unknown-package
    input:
      ecosystem: npm
      package_name: package-that-should-not-exist-endor-agent-kit
      version: 0.0.1
    expected:
      risk_posture: UNKNOWN
      required_evidence:
        - unavailable or incomplete evidence must be named
        - do not fabricate package scores, license, vulnerabilities, or typosquat evidence
      data_gaps_allowed: true
