recipe_schema_version: 1
id: troubleshooting
name: Troubleshooting
legacy_ids:
  - endor-troubleshooter
version: 0.1.0
description: |
  Use this agent when the user needs help diagnosing and fixing Endor Labs
  errors, warnings, missing integrations, scan failures, slow scans, or
  unhealthy configuration. Troubleshooting gathers the smallest useful
  read-only Endor evidence, classifies the issue across scan, integration,
  authentication, dependency resolution, container, reachability, policy, and
  workflow lanes, then returns low-friction repair guidance without mutating
  Endor, source-provider, or repository state.
audience: developer
short_description: "Diagnoses and fixes Endor Labs errors, missing integrations, scan failures, and unhealthy configuration."
authors: ["Endor Labs"]
safety_class: read_only
endor_tier_minimum: enterprise
policy_pack_support: true
supported_transports:
  - endorctl_agent_api
host_capabilities_required:
  run_commands: true
  read_files: false
  write_files: false
  open_pr: false
inputs:
  - name: policy_pack
    kind: object
    required: false
    description: Optional trusted Agent Policy Pack context supplied by runtime or protected workspace configuration.
  - name: namespace
    kind: string
    required: false
    description: Optional Endor namespace. The artifact uses the configured namespace when omitted.
  - name: issue_summary
    kind: string
    required: false
    description: Natural-language description of the error, warning, missing integration, slow scan, or unhealthy behavior.
  - name: error_text
    kind: string
    required: false
    description: Optional pasted command, UI, API, CI, or integration error output with secrets removed.
  - name: endor_project_selector
    kind: string
    required: false
    description: Optional Endor project name, repository URL, owner/repo, tag, or UUID used to scope troubleshooting.
  - name: repository_url
    kind: string
    required: false
    description: Optional repository URL associated with the issue.
  - name: scan_result_uuid
    kind: string
    required: false
    description: Optional ScanResult UUID from a failed, partial, slow, or unexpected scan.
  - name: scan_workflow_result_uuid
    kind: string
    required: false
    description: Optional ScanWorkflowResult UUID or execution identifier from an automated workflow run.
  - name: integration_selector
    kind: string
    required: false
    description: Optional Installation, PackageManager, SCMCredential, IdentityProvider, PRCommentConfig, exporter, or external integration selector.
  - name: issue_area_hint
    kind: enum
    required: false
    description: Optional hint such as scan, pr_scan, dependency_resolution, auth, sso, integration, container, reachability, policy, sbom, exporter, or unknown.
  - name: report_mode
    kind: enum
    required: false
    description: concise or full. Defaults to concise; full includes deeper evidence tables and alternate hypotheses.
outputs:
  - name: troubleshooting_verdict
    kind: enum
    required: true
    description: ACTIONABLE_FIX_IDENTIFIED, LIKELY_ROOT_CAUSE_IDENTIFIED, PARTIAL_DIAGNOSIS, INSUFFICIENT_DATA, SUPPORT_ESCALATION_RECOMMENDED, or NO_ISSUE_FOUND.
  - name: executive_summary
    kind: object
    required: true
    description: Compact user-facing summary with issue title, likely owner, impact, confidence, next best action, and whether any confirmation is required.
  - name: intake_classification
    kind: object
    required: true
    description: Parsed issue summary, issue lanes, affected Endor objects, affected product area, and any inferred ecosystem or integration type.
  - name: issue_lanes
    kind: list[object]
    required: true
    description: Classified troubleshooting lanes with status, confidence, evidence used, reason codes, and lane-specific next steps.
  - name: affected_resources
    kind: list[object]
    required: true
    description: Endor resources, repository selectors, scan IDs, workflow IDs, integrations, and external systems relevant to the diagnosis.
  - name: evidence_queries
    kind: list[object]
    required: true
    description: Universal evidence ledger entries with name, resource, source, status, query_template_id, filter_summary, field_mask_summary, result_count, and reason.
  - name: evidence_summary
    kind: object
    required: true
    description: Normalized facts from logs, statuses, exit codes, workflow errors, scan profiles, integrations, package managers, reachability, policy, or container evidence.
  - name: root_cause_hypotheses
    kind: list[object]
    required: true
    description: Ranked possible causes with confidence, supporting evidence, contradicting evidence, and the next observation that would confirm or falsify each one.
  - name: recommended_actions
    kind: list[object]
    required: true
    description: Prioritized human-readable repair steps with owner role, reason, friction level, validation step, confidence, and confirmation requirement.
  - name: validation_plan
    kind: list[object]
    required: true
    description: Read-only checks or safe rerun instructions a human can use after applying recommendations.
  - name: support_escalation_packet
    kind: object
    required: true
    description: Redacted evidence bundle to send to Endor Support when the issue cannot be resolved from tenant-visible evidence.
  - name: data_gaps
    kind: list[string]
    required: true
    description: Missing namespace, project, scan, workflow, log, integration, package manager, policy, container, or auth evidence.
  - name: future_action_contracts
    kind: list[object]
    required: true
    description: Mutating, scan-rerun, credential, configuration-write, comment, or create-style log-request steps that V1 must not perform without a future explicit user approval gate.
  - name: future_scope
    kind: list[string]
    required: true
    description: Explicitly out-of-scope V2 automation such as applying fixes, creating integrations, editing scan profiles, rerunning scans, posting comments, or creating support tickets.
  - name: policy_context
    kind: object
    required: true
    description: Trusted policy pack status, id, version, SHA-256, and source. Use not_configured when no policy pack is active.
  - name: policy_evaluations
    kind: list[object]
    required: true
    description: Applicable policy decisions with policy id, effect, decision, message, facts used, and missing facts.
evals: evals/cases.yaml
compatible_hosts:
  - claude-code
  - claude-managed-agents
  - codex
  - gemini
  - portable
host_editions:
  claude-code:
    - enterprise-edition
  claude-managed-agents:
    - enterprise-edition
  gemini:
    - enterprise-edition
mutations: []
required_endor_mcp_tools: []
endorctl_agent_api_invocations:
  - resolve_project_or_resource_selector
  - list_scan_results
  - get_scan_result
  - list_scan_workflow_results
  - get_scan_workflow_result
  - list_scan_workflows
  - list_scan_profiles
  - list_package_versions
  - list_package_manager_integrations
  - list_scm_credentials
  - list_installations
  - list_identity_providers
  - list_pr_comment_configs
  - list_findings_and_policies
  - list_call_graph_data
  - inspect_container_registry_scan_evidence
  - inspect_exporter_or_notification_evidence
instructions_path: instructions.md
model: sonnet
requires_endor_mcp: ""
requires_endorctl: ">=1.0.0"
