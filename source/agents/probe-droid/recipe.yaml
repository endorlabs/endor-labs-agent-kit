recipe_schema_version: 1
id: probe-droid
name: Probe Droid
version: 0.1.0
description: |
  Use this agent when the user wants to assess GitHub repository onboarding
  gaps for Endor Labs monitored-branch coverage. Probe Droid compares
  github.com organization or repository inventory with Endor project, GitHub
  App, package, scan, scan profile, package manager integration, dependency
  resolution, and reachability evidence, then returns human-readable setup
  actions without mutating source, GitHub, or Endor state.
safety_class: read_only
endor_tier_minimum: enterprise
supported_transports:
  - endorctl_api
host_capabilities_required:
  run_commands: true
  read_files: false
  write_files: false
  open_pr: false
inputs:
  - name: namespace
    kind: string
    required: false
    description: Optional Endor namespace. The artifact uses the configured namespace when omitted.
  - name: github_org
    kind: string
    required: false
    description: GitHub.com organization to inventory. This is the default org-wide workflow.
  - name: repository_urls
    kind: list[string]
    required: false
    description: Optional explicit GitHub.com repository URLs or owner/repo selectors for targeted single-repo or subset analysis.
  - name: github_inventory_json
    kind: object
    required: false
    description: Optional exported GitHub inventory JSON fallback when gh CLI live inventory is unavailable.
  - name: endor_project_selector
    kind: string
    required: false
    description: Optional Endor project name, repository URL, tag, or UUID used to scope the Endor comparison.
  - name: sampling_mode
    kind: enum
    required: false
    description: none, random, or stratified. Defaults to none; stratified is recommended for organizations with more than 1000 repositories.
  - name: sample_size
    kind: integer
    required: false
    description: Repository sample size for sampling mode. Recommended range is 500 to 1000 for very large organizations.
  - name: sample_seed
    kind: string
    required: false
    description: Optional stable seed for reproducible random or stratified sampling.
  - name: inactive_threshold_days
    kind: integer
    required: false
    description: Defaults to 365. Repositories with no recent push or default-branch commit are flagged for scope decision.
  - name: exclude_inactive_repositories
    kind: boolean
    required: false
    description: Defaults to false. When true, inactive repositories are excluded from the coverage denominator.
  - name: include_archived_repositories
    kind: boolean
    required: false
    description: Defaults to false. Archived repositories are excluded by default and are never coverage blockers unless explicitly included.
  - name: report_mode
    kind: enum
    required: false
    description: full or executive. Defaults to full. Executive mode keeps prose and the first JSON section compact while preserving complete drill-down JSON arrays.
outputs:
  - name: onboarding_verdict
    kind: enum
    required: true
    description: READY_TO_ONBOARD, PARTIAL_COVERAGE, NOT_ONBOARDED, or INSUFFICIENT_DATA.
  - name: executive_report
    kind: object
    required: true
    description: Compact rollup with verdict, top counts, top 5 actions, top blockers, and drill-down pointers for large orgs.
  - name: report_scope
    kind: object
    required: true
    description: GitHub org, repository subset, sampling mode, sample size, sample seed, monitored branch policy, and explicit V1 exclusions.
  - name: coverage_summary
    kind: object
    required: true
    description: Executive rollup of repos in scope, excluded repos, matched Endor projects, onboarded healthy repos, onboarding gaps, dependency resolution gaps, reachability gaps, and repeated blockers.
  - name: github_inventory_summary
    kind: object
    required: true
    description: GitHub.com inventory source, permission limits, pagination or sampling status, archived/inactive counts, and manifest discovery summary.
  - name: github_app_coverage
    kind: object
    required: true
    description: Endor-side GitHub App evidence for installation, selected repos, scanner enablement, sync errors, and archived repo behavior when available.
  - name: not_onboarded_repositories
    kind: list[object]
    required: true
    description: GitHub repos with no strict Endor project or scan match, plus inferred setup prescriptions from GitHub evidence.
  - name: onboarded_repositories_with_gaps
    kind: list[object]
    required: true
    description: Strictly matched Endor projects with dependency resolution, reachability, scan profile, package manager, GitHub App, branch, stale scan, or evidence gaps.
  - name: onboarded_healthy_repositories
    kind: list[object]
    required: true
    description: Strictly matched repos with successful monitored-branch scan, dependency resolution, and reachability evidence for supported ecosystems.
  - name: ambiguous_matches
    kind: list[object]
    required: true
    description: GitHub repos that match multiple Endor projects or cannot be matched without human disambiguation.
  - name: excluded_repositories
    kind: list[object]
    required: true
    description: Archived, disabled, explicitly excluded, or optionally inactive repos kept out of the main denominator.
  - name: recommended_actions
    kind: list[object]
    required: true
    description: Prioritized human-readable setup actions with owner role, confidence, evidence, confirmation requirement, and expected coverage gain.
  - name: confirmed_org_wide_actions
    kind: list[object]
    required: true
    description: Setup actions backed by complete in-scope inventory rather than sample-only evidence.
  - name: sampled_prescription_hypotheses
    kind: list[object]
    required: true
    description: Large-org sampled findings that must not be treated as confirmed org-wide blockers until validated.
  - name: requires_full_inventory_validation
    kind: list[object]
    required: true
    description: Follow-up read-only checks needed before treating sampled hypotheses or truncated inventory as confirmed org-wide findings.
  - name: validation_plan
    kind: list[object]
    required: true
    description: Read-only checks humans can run after applying recommendations to verify onboarding health.
  - name: evidence_queries
    kind: list[object]
    required: true
    description: Exact GitHub and Endor read-only queries attempted, purpose, status, returned counts, fields used, and data gaps.
  - name: data_gaps
    kind: list[string]
    required: true
    description: Missing GitHub, GitHub App, Endor, scan, package manager, dependency resolution, or reachability evidence.
  - name: future_scope
    kind: list[string]
    required: true
    description: Explicitly out-of-scope V2 items, especially PR scan coverage and quick-vs-full reachability diagnostics.
evals: evals/cases.yaml
compatible_hosts:
  - claude-code
  - claude-managed-agents
  - codex
  - portable
host_editions:
  claude-code:
    - enterprise-edition
  claude-managed-agents:
    - enterprise-edition
mutations: []
required_endor_mcp_tools: []
endorctl_api_invocations:
  - list_endor_projects
  - list_endor_repositories
  - list_repository_versions
  - list_github_app_installations
  - list_project_scan_results
  - list_project_scan_workflows
  - list_project_package_versions
  - list_scan_profiles
  - list_package_manager_integrations
  - list_call_graph_data
  - list_dependency_metadata
  - inspect_resolution_errors_and_reachability_status
instructions_path: instructions.md
model: sonnet
requires_endor_mcp: ""
requires_endorctl: ">=1.0"
