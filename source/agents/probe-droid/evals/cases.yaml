cases:
  - id: github-org-selected-repos-partial-coverage
    input:
      github_org: acme
      sampling_mode: none
      target_success_goal: monitored_branch_onboarding
    expected:
      onboarding_verdict: PARTIAL_COVERAGE
      required_evidence:
        - compare GitHub.com org inventory with strict Endor Project matches
        - separate not_onboarded_repositories from onboarded_repositories_with_gaps
        - use Endor-side GitHub App coverage when available and report REPO_NOT_SELECTED_IN_APP for repos outside selected coverage
        - include evidence_queries for GitHub inventory and Endor project, scan, package, scan profile, package manager, and GitHub App lookups
      data_gaps_allowed: true

  - id: private-registry-resolution-error
    input:
      repository_urls:
        - https://github.com/acme/payments-api
      target_success_goal: dependency_resolution
    expected:
      onboarding_verdict: PARTIAL_COVERAGE
      required_evidence:
        - use PackageVersion evidence and spec.resolution_errors when available
        - classify ERROR_CATEGORY_PRIVATE_REGISTRY as DEPENDENCY_RESOLUTION_PRIVATE_REGISTRY
        - classify package manager setup as PACKAGE_MANAGER_INTEGRATION_MISSING, PACKAGE_MANAGER_INTEGRATION_NOT_APPLIED, PACKAGE_MANAGER_AUTH_FAILED, PACKAGE_MANAGER_REGISTRY_UNKNOWN, or PACKAGE_MANAGER_CONFIG_IN_REPO_ONLY
        - prescribe human-readable private registry setup with confirmation_required true and no Endor write
      data_gaps_allowed: true

  - id: reachability-blocked-by-resolution-or-toolchain
    input:
      repository_urls:
        - https://github.com/acme/service-core
      target_success_goal: reachability
    expected:
      onboarding_verdict: PARTIAL_COVERAGE
      required_evidence:
        - distinguish REACHABILITY_DEPENDENCY_RESOLUTION_BLOCKED from REACHABILITY_BUILD_TOOLCHAIN_FAILED and REACHABILITY_UNSUPPORTED_ECOSYSTEM
        - do not promise function-level reachability for unsupported ecosystems
        - keep pull request quick-vs-full scan coverage in future_scope
      data_gaps_allowed: true

  - id: single-repo-before-onboarding
    input:
      repository_urls:
        - https://github.com/acme/new-service
      target_success_goal: pre_onboarding
    expected:
      onboarding_verdict: NOT_ONBOARDED
      required_evidence:
        - inventory the GitHub.com repository default branch and bounded manifest files without cloning
        - report no strict Endor project match in not_onboarded_repositories
        - prescribe GitHub App repository selection, scan profile intent, toolchain intent, and package manager setup as proposed human actions only
      data_gaps_allowed: true

  - id: large-org-stratified-sampling
    input:
      github_org: acme-enterprise
      sampling_mode: stratified
      sample_size: 750
      sample_seed: probe-droid-regression
    expected:
      onboarding_verdict: PARTIAL_COVERAGE
      required_evidence:
        - record sample_size, sample_seed, sampling_basis, and coverage_limitations
        - place sample-only findings in sampled_prescription_hypotheses
        - place follow-up checks in requires_full_inventory_validation
        - do not extrapolate sampled findings as exact org-wide counts
      data_gaps_allowed: true

  - id: inactive-and-archived-repository-classification
    input:
      github_org: acme
      inactive_threshold_days: 365
      include_archived_repositories: false
      exclude_inactive_repositories: false
    expected:
      onboarding_verdict: PARTIAL_COVERAGE
      required_evidence:
        - exclude archived repositories by default and do not recommend scanning archived repos
        - flag inactive repositories without excluding them by default
        - include excluded_repositories and confidence reasons for exclusion or inactivity classification
      data_gaps_allowed: true

  - id: missing-github-access
    input:
      namespace: tenant-a
      endor_project_selector: acme
    expected:
      onboarding_verdict: INSUFFICIENT_DATA
      required_evidence:
        - request a GitHub.com organization, repository URL list, exported GitHub inventory JSON, or read-only gh authentication when GitHub inventory is unavailable
        - use available Endor project evidence only as partial context
        - data_gaps names the missing GitHub inventory signal
      data_gaps_allowed: true

  - id: selected-repos-sanitized-regression
    input:
      github_org: acme-labs
      namespace: demo-namespace
      report_mode: executive
      sanitized_fixture: tests/fixtures/probe_droid_selected_repos_regression.yaml
    expected:
      onboarding_verdict: PARTIAL_COVERAGE
      required_evidence:
        - report 22 strict GitHub-to-Endor matches and 50 not_onboarded_repositories from sanitized evidence
        - classify Endor GitHub App coverage as APP_INSTALLED_SELECTED_REPOS and map selected project UUIDs back to selected repository names
        - report REPO_NOT_SELECTED_IN_APP for GitHub repositories outside the Endor installation selected project set
        - classify npm E401 dependency download failure as DEPENDENCY_RESOLUTION_PRIVATE_REGISTRY and PACKAGE_MANAGER_AUTH_FAILED
        - classify Python psycopg2 pg_config failures as DEPENDENCY_RESOLUTION_TOOLCHAIN_MISSING and REACHABILITY_BUILD_TOOLCHAIN_FAILED
        - include executive_report top counts and top actions while keeping drill-down arrays in JSON
      data_gaps_allowed: true

  - id: org-url-under-repository-urls-normalized
    input:
      namespace: demo-namespace
      repository_urls:
        - https://github.com/acme-labs
      natural_language_scope: Assess Endor onboarding readiness for this single GitHub.com org.
      report_mode: full
    expected:
      onboarding_verdict: PARTIAL_COVERAGE
      required_evidence:
        - normalize https://github.com/acme-labs under repository_urls to github_org acme-labs when the user asks for org-wide scope
        - report org-wide coverage-vs-health counts before JSON drill-down
        - classify each repository in not_onboarded_repositories, onboarded_repositories_with_gaps, onboarded_healthy_repositories, ambiguous_matches, or excluded_repositories
      data_gaps_allowed: true

  - id: endor-field-shape-normalization
    input:
      github_org: acme-labs
      namespace: demo-namespace
      target_success_goal: field_shape_regression
    expected:
      onboarding_verdict: PARTIAL_COVERAGE
      required_evidence:
        - do not require Project.spec.monitored_branch in the Project field mask
        - normalize ScanResult.spec.refs when it is an array of strings such as ["main"]
        - treat PackageVersion spec.resolution_errors empty object as no meaningful resolution failure
        - use --list-all for targeted PackageVersion queries so top offender counts are not capped by default pagination
        - retry Repository evidence with uuid,meta.name,meta.tags,spec if context is rejected in the field mask
      data_gaps_allowed: true
