recipe_schema_version: 1
id: upgrade-impact-analysis
name: Endor Labs Upgrade Impact Analysis
version: 1.0.0
description: |
  Use this agent when the user asks for Endor Labs Upgrade Impact Analysis:
  safe upgrade paths, upgrade risk, findings fixed or introduced, Code Impact
  Analysis, breaking changes, manifest targeting, or whether a dependency
  upgrade should happen now. The artifact queries Endor's read-only
  VersionUpgrade workflow through documented Endor API or endorctl paths.
audience: developer
short_description: "Safe upgrade paths and upgrade risk for a dependency: findings fixed or introduced, breaking changes, and code impact."
authors: ["Endor Labs"]
safety_class: read_only
endor_tier_minimum: free
supported_transports:
  - endorctl_api
host_capabilities_required:
  run_commands: true
  read_files: false
  write_files: false
  open_pr: false
inputs:
  - name: namespace
    kind: string
    required: false
    description: Endor tenant namespace. The artifact uses the configured namespace when omitted.
  - name: project_name
    kind: string
    required: false
    description: Optional human project selector such as owner/repo, repository name, Endor project name, or repository URL.
  - name: repository_url
    kind: string
    required: false
    description: Optional source repository URL when the host cannot infer it from a local checkout or session context.
  - name: project_uuid
    kind: string
    required: false
    description: Optional advanced fallback when project_name or repository_url cannot be resolved uniquely.
  - name: finding_uuid
    kind: string
    required: false
    description: Optional finding UUID for the Endor canonical single-finding fixing-upgrade map.
  - name: upgrade_uuid
    kind: string
    required: false
    description: Optional VersionUpgrade UUID for detailed CIA and breaking-change expansion.
  - name: ecosystem
    kind: string
    required: false
    description: Package ecosystem, such as npm, pypi, maven, go, cargo, gem, nuget, or packagist.
  - name: package_name
    kind: string
    required: false
    description: Exact package name as it appears in Endor upgrade_info.direct_dependency_package or a manifest.
  - name: current_version
    kind: string
    required: false
    description: Currently used package version, used to filter or cross-check VersionUpgrade records when available.
  - name: target_version
    kind: string
    required: false
    description: Candidate upgrade version, used to filter or cross-check VersionUpgrade records when available.
  - name: best_only
    kind: boolean
    required: false
    description: Defaults to the platform's best_only=true for recommendation lists.
outputs:
  - name: upgrade_recommendation
    kind: enum
    required: true
    description: UPGRADE_NOW, UPGRADE_WITH_CAUTION, DEFER, or INSUFFICIENT_DATA.
  - name: risk_delta
    kind: enum
    required: true
    description: LOWER, SAME, HIGHER, or UNKNOWN.
  - name: reasons
    kind: list[string]
    required: true
    description: Evidence-backed reasons for the upgrade recommendation.
  - name: breaking_change_notes
    kind: list[string]
    required: true
    description: Known or suspected compatibility notes, or data gaps when unavailable.
  - name: next_checks
    kind: list[string]
    required: true
    description: Follow-up checks, tests, or review areas before merging the upgrade.
  - name: summary
    kind: string
    required: true
    description: One-paragraph human-readable upgrade assessment.
  - name: evidence_queries
    kind: list[object]
    required: true
    description: Universal evidence ledger entries with name, resource, source, status, query_template_id, filter_summary, field_mask_summary, result_count, and reason.
  - name: data_gaps
    kind: list[string]
    required: true
    description: Signals that were unavailable because setup, auth, edition, or tooling was missing.
  - name: upgrade_candidates
    kind: list[object]
    required: false
    description: VersionUpgrade candidates ranked by platform priority.
  - name: selected_upgrade
    kind: object
    required: false
    description: The selected Endor platform VersionUpgrade candidate, including UUID, package, from/to versions, risk, and recommendation flags.
  - name: findings_fixed
    kind: integer
    required: false
    description: Number of findings the selected VersionUpgrade fixes.
  - name: findings_introduced
    kind: integer
    required: false
    description: Number of findings the selected VersionUpgrade introduces.
  - name: cia_status
    kind: string
    required: false
    description: Endor Code Impact Analysis summary such as no breaking changes or api breaking changes.
  - name: breaking_changes
    kind: list[string]
    required: false
    description: CIA breaking-change details from VersionUpgrade detail records.
  - name: manifest_files
    kind: list[string]
    required: false
    description: Direct dependency manifest files reported by VersionUpgrade.
  - name: dependency_delta
    kind: object
    required: false
    description: deps_added, deps_removed, and conflicts from VersionUpgrade.
  - name: fixed_cves
    kind: list[string]
    required: false
    description: CVE or GHSA identifiers fixed by the selected VersionUpgrade.
  - name: endor_patch
    kind: string
    required: false
    description: Endor Patch target version when VersionUpgrade reports one.
  - name: score_explanation
    kind: string
    required: false
    description: Platform score explanation from VersionUpgrade.
evals: evals/cases.yaml
compatible_hosts:
  - claude-code
  - claude-managed-agents
  - codex
  - gemini
  - portable
host_editions:
  claude-code:
    - enterprise-edition
  claude-managed-agents:
    - enterprise-edition
mutations: []
required_endor_mcp_tools: []
endorctl_api_invocations:
  - resolve_project_from_repository
  - list_version_upgrade_recommendations
  - get_version_upgrade_details
  - get_finding_fixing_upgrades
instructions_path: instructions.md
model: sonnet
requires_endor_mcp: ""
requires_endorctl: ">=1.0.0"
