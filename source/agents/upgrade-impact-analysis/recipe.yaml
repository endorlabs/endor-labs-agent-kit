recipe_schema_version: 1
id: upgrade-impact-analysis
name: Endor Labs Upgrade Impact Analysis
version: 1.0.0
description: |
  Use this agent when the user asks for Endor Labs Upgrade Impact Analysis:
  safe upgrade paths, upgrade risk, findings fixed or introduced, Code Impact
  Analysis, breaking changes, manifest targeting, or whether a dependency
  upgrade should happen now. Enterprise Edition mirrors AURI's read-only UIA
  workflow by querying precomputed VersionUpgrade resources. Developer Edition
  is a lighter MCP-only explicit package-version comparator.
safety_class: read_only
endor_tier_minimum: free
supported_transports:
  - mcp
  - endorctl_api
host_capabilities_required:
  run_commands: true
  read_files: false
  write_files: false
  open_pr: false
inputs:
  - name: namespace
    kind: string
    required: false
    description: Endor tenant namespace. Enterprise Edition uses the configured namespace when omitted.
  - name: project_name
    kind: string
    required: false
    description: Optional human project selector such as owner/repo, repository name, Endor project name, or repository URL.
  - name: repository_url
    kind: string
    required: false
    description: Optional source repository URL when the host cannot infer it from a local checkout or session context.
  - name: project_uuid
    kind: string
    required: false
    description: Optional advanced fallback when project_name or repository_url cannot be resolved uniquely.
  - name: finding_uuid
    kind: string
    required: false
    description: Optional finding UUID for the AURI canonical single-finding fixing-upgrade map.
  - name: upgrade_uuid
    kind: string
    required: false
    description: Optional VersionUpgrade UUID for detailed CIA and breaking-change expansion.
  - name: ecosystem
    kind: string
    required: false
    description: Package ecosystem, such as npm, pypi, maven, go, cargo, gem, nuget, or packagist.
  - name: package_name
    kind: string
    required: false
    description: Exact package name as it appears in Endor upgrade_info.direct_dependency_package or a manifest.
  - name: current_version
    kind: string
    required: false
    description: Currently used package version, especially for Developer Edition or package-version fallback.
  - name: target_version
    kind: string
    required: false
    description: Candidate upgrade version, especially for Developer Edition or package-version fallback.
  - name: best_only
    kind: boolean
    required: false
    description: Enterprise Edition defaults to AURI's best_only=true for recommendation lists.
outputs:
  - name: upgrade_recommendation
    kind: enum
    required: true
    description: UPGRADE_NOW, UPGRADE_WITH_CAUTION, DEFER, or INSUFFICIENT_DATA.
  - name: risk_delta
    kind: enum
    required: true
    description: LOWER, SAME, HIGHER, or UNKNOWN.
  - name: reasons
    kind: list[string]
    required: true
    description: Evidence-backed reasons for the upgrade recommendation.
  - name: breaking_change_notes
    kind: list[string]
    required: true
    description: Known or suspected compatibility notes, or data gaps when unavailable.
  - name: next_checks
    kind: list[string]
    required: true
    description: Follow-up checks, tests, or review areas before merging the upgrade.
  - name: summary
    kind: string
    required: true
    description: One-paragraph human-readable upgrade assessment.
  - name: data_gaps
    kind: list[string]
    required: true
    description: Signals that were unavailable because setup, auth, edition, or tooling was missing.
  - name: upgrade_candidates
    kind: list[object]
    required: false
    description: Enterprise Edition VersionUpgrade candidates ranked like AURI.
  - name: selected_upgrade
    kind: object
    required: false
    description: The selected AURI VersionUpgrade candidate, including UUID, package, from/to versions, risk, and recommendation flags.
  - name: findings_fixed
    kind: integer
    required: false
    description: Number of findings the selected VersionUpgrade fixes.
  - name: findings_introduced
    kind: integer
    required: false
    description: Number of findings the selected VersionUpgrade introduces.
  - name: cia_status
    kind: string
    required: false
    description: AURI Code Impact Analysis summary such as no breaking changes or api breaking changes.
  - name: breaking_changes
    kind: list[string]
    required: false
    description: CIA breaking-change details from VersionUpgrade detail records.
  - name: manifest_files
    kind: list[string]
    required: false
    description: Direct dependency manifest files reported by VersionUpgrade.
  - name: dependency_delta
    kind: object
    required: false
    description: deps_added, deps_removed, and conflicts from VersionUpgrade.
  - name: fixed_cves
    kind: list[string]
    required: false
    description: CVE or GHSA identifiers fixed by the selected VersionUpgrade.
  - name: endor_patch
    kind: string
    required: false
    description: Endor Patch target version when VersionUpgrade reports one.
  - name: score_explanation
    kind: string
    required: false
    description: Platform score explanation from VersionUpgrade.
evals: evals/cases.yaml
compatible_hosts:
  - claude-code
  - claude-managed-agents
mutations: []
required_endor_mcp_tools:
  - check_dependency_for_risks
  - check_dependency_for_vulnerabilities
  - get_endor_vulnerability
endorctl_api_invocations:
  - resolve_project_from_repository
  - list_version_upgrade_recommendations
  - get_version_upgrade_details
  - get_finding_fixing_upgrades
  - lookup_current_package_version_uuid
  - lookup_target_package_version_uuid
  - get_current_package_scores
  - get_target_package_scores
  - get_target_package_license
  - query_similar_packages
instructions_path: instructions.md
model: sonnet
requires_endor_mcp: ">=2.4"
requires_endorctl: ">=1.0"
