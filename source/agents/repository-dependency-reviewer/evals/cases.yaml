cases:
  - id: npm-lockfile-vulnerable-direct-dependency
    input:
      repository_files:
        package.json: |
          {"dependencies":{"lodash":"^4.17.20"}}
        package-lock.json: |
          {"packages":{"node_modules/lodash":{"version":"4.17.20"}}}
    expected:
      risk_posture: MODERATE
      required_evidence:
        - package-lock.json is used to resolve the exact lodash version
        - Endor vulnerability evidence is checked for lodash 4.17.20
      data_gaps_allowed: true

  - id: maven-critical-direct-dependency
    input:
      repository_files:
        pom.xml: |
          <project>
            <dependencies>
              <dependency>
                <groupId>org.apache.logging.log4j</groupId>
                <artifactId>log4j-core</artifactId>
                <version>2.14.1</version>
              </dependency>
            </dependencies>
          </project>
    expected:
      risk_posture: CRITICAL
      required_evidence:
        - maven coordinate org.apache.logging.log4j:log4j-core version 2.14.1 is checked
        - critical vulnerability, CISA KEV, high EPSS, known exploited, or malware evidence
      data_gaps_allowed: true

  - id: unresolved-version-range
    input:
      repository_files:
        requirements.txt: |
          django>=3.2
          requests
    expected:
      risk_posture: UNKNOWN
      required_evidence:
        - unresolved versions are named instead of guessed
        - no approximate package versions are sent to Endor
      data_gaps_allowed: true

  - id: clean-reviewed-repository
    input:
      repository_files:
        go.mod: |
          module example.com/service
          require github.com/stretchr/testify v1.10.0
    expected:
      risk_posture: LOW
      required_evidence:
        - exact Go module coordinate is checked with Endor MCP tools
        - no meaningful risk found in available signals
      data_gaps_allowed: true
