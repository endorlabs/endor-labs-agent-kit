recipe_schema_version: 1
id: remediation-planner
name: Remediation Planner
version: 0.1.0
description: Preview safe remediation options without opening PRs.
safety_class: read_only
endor_tier_minimum: enterprise
supported_transports:
- endorctl_api
host_capabilities_required:
  run_commands: true
  read_files: false
  write_files: false
  open_pr: false
inputs:
- name: namespace
  kind: namespace
  required: false
  description: Namespace
- name: project_name
  kind: string
  required: false
  description: Optional human project selector such as owner/repo, repository name, Endor project name, or repository URL.
- name: repository_url
  kind: string
  required: false
  description: Optional source repository URL when the host cannot infer it from a local checkout or session context.
- name: project_uuid
  kind: string
  required: false
  description: Optional advanced fallback when project_name or repository_url cannot be resolved uniquely.
- name: finding_uuid
  kind: string
  required: false
  description: Optional finding UUID
- name: package_name
  kind: string
  required: false
  description: Optional package name
outputs:
- name: summary
  kind: string
  required: true
  description: Concise result summary.
- name: project_resolution
  kind: object
  required: true
  description: Project resolution status, namespace provenance, query attempts, and repository selector evidence.
- name: evidence_queries
  kind: list[object]
  required: true
  description: Universal evidence ledger entries with name, resource, source, status, query_template_id, filter_summary, field_mask_summary, result_count, and reason.
- name: remediation_options
  kind: list[object]
  required: true
  description: Verified Endor Finding and VersionUpgrade/UIA remediation options, or empty when evidence is unavailable.
- name: selected_remediation
  kind: object
  required: true
  description: Selected remediation option, or null when evidence is insufficient.
- name: data_gaps
  kind: list[string]
  required: true
  description: Missing Endor, source, or host signals.
evals: evals/cases.yaml
compatible_hosts:
- claude-code
- codex
- gemini
- portable
host_editions:
  claude-code:
  - enterprise-edition
mutations: []
required_endor_mcp_tools: []
endorctl_api_invocations:
- resolve_project_from_repository
- list_version_upgrade_recommendations
- get_version_upgrade_details
- get_finding_fixing_upgrades
instructions_path: instructions.md
model: sonnet
requires_endor_mcp: ''
requires_endorctl: '>=1.0'
