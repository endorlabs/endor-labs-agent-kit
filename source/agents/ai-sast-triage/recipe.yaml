recipe_schema_version: 1
id: ai-sast-triage
name: AI SAST Triage
version: 0.1.0
description: Parse Endor AI SAST findings, fetch source at the pinned commit, generate grounded patches for confirmed true positives, and open change requests when requested.
safety_class: mutating
endor_tier_minimum: enterprise
supported_transports:
- mcp
- endorctl_api
host_capabilities_required:
  run_commands: true
  read_files: true
  write_files: true
  open_pr: true
inputs:
- name: project_name
  kind: string
  required: false
  description: Optional human project selector such as owner/repo, repository name, Endor project name, or repository URL. The agent should infer this from the current Git workspace first, not ask the user for a project UUID.
- name: repository_url
  kind: string
  required: false
  description: Optional source repository URL when the agent is not running inside the target repository. Normally inferred from git remote origin.
- name: finding_limit
  kind: integer
  required: false
  description: Maximum AI SAST findings to triage after project resolution.
- name: severity_filter
  kind: list[string]
  required: false
  description: Optional Endor severity filter such as CRITICAL or HIGH.
- name: cwe_filter
  kind: list[string]
  required: false
  description: Optional CWE filter such as CWE-79.
- name: finding_uuids
  kind: list[string]
  required: false
  description: Optional finding UUID allow-list for targeted re-triage. Do not require this for normal use.
- name: namespace
  kind: string
  required: false
  description: Optional Endor namespace override when the tenant uses child namespaces.
outputs:
- name: summary
  kind: string
  required: true
  description: Triage summary including confirmed TPs, likely FPs, inconclusive findings, patches ready, and PR/MR counters.
- name: verdicts
  kind: list[object]
  required: true
  description: Per-finding parsed AI SAST classification, scorecard evidence, severity scoring, data-flow anchors, and deterministic skip reason when applicable.
- name: patches
  kind: list[object]
  required: true
  description: Generated unified diffs with confidence, patch reason, sibling-file references, and source SHA for TRUE_POSITIVE findings with source context.
- name: change_requests
  kind: list[object]
  required: true
  description: PR/MR URLs, branches, status, and failure reason for any requested change-request creation.
- name: data_gaps
  kind: list[string]
  required: true
  description: Missing Endor, source, or host signals.
evals: evals/cases.yaml
compatible_hosts:
- claude-code
host_editions:
  claude-code:
  - enterprise-edition
mutations:
- write_files
- open_pr
required_endor_mcp_tools:
- get_resource
endorctl_api_invocations:
- resolve_project_from_repository
- list_ai_sast_findings
- get_finding_explanation
- fetch_project_source_version
instructions_path: instructions.md
model: sonnet
requires_endor_mcp: Endor MCP server with access to the customer tenant.
requires_endorctl: '>=1.0'
