recipe_schema_version: 1
id: dependency-decision-helper
name: Dependency Decision Helper
version: 1.0.0
description: |
  Use this agent when the user asks whether to add, upgrade, or use a specific
  package version. Examples: "Is lodash 4.17.20 safe?", "Should I use requests
  2.28.0?", "Check log4j-core 2.14.1 before I add it." Returns a dependency
  verdict with evidence, conditions, alternatives, and any data gaps.
audience: developer
short_description: "Should you add, upgrade, or use a specific package version? Returns a verdict with evidence, conditions, and alternatives."
authors: ["Endor Labs"]
safety_class: read_only
endor_tier_minimum: free
policy_pack_support: true
supported_transports:
  - mcp
  - endorctl_agent_api
host_capabilities_required:
  run_commands: true
  read_files: false
  write_files: false
  open_pr: false
inputs:
  - name: policy_pack
    kind: object
    required: false
    description: Optional trusted Agent Policy Pack context supplied by runtime or protected workspace configuration.
  - name: ecosystem
    kind: string
    required: true
    description: Package ecosystem, such as npm, pypi, maven, go, cargo, gem, nuget, or packagist.
  - name: package_name
    kind: string
    required: true
    description: Exact package name as it appears in a manifest.
  - name: version
    kind: string
    required: true
    description: Exact package version to assess.
outputs:
  - name: verdict
    kind: enum
    required: true
    description: SAFE, SAFE_WITH_CONDITIONS, NOT_RECOMMENDED, or BLOCKED.
  - name: conditions
    kind: list[string]
    required: true
    description: Evidence-backed conditions that explain the verdict.
  - name: alternatives
    kind: list[string]
    required: true
    description: Safer package names or versions when available.
  - name: summary
    kind: string
    required: true
    description: One-paragraph human-readable assessment.
  - name: evidence_queries
    kind: list[object]
    required: true
    description: Universal evidence ledger entries with name, resource, source, status, query_template_id, filter_summary, field_mask_summary, result_count, and reason.
  - name: data_gaps
    kind: list[string]
    required: true
    description: Signals that were unavailable because setup, auth, edition, or tooling was missing.
  - name: policy_context
    kind: object
    required: true
    description: Trusted policy pack status, id, version, SHA-256, and source. Use not_configured when no policy pack is active.
  - name: policy_evaluations
    kind: list[object]
    required: true
    description: Applicable policy decisions with policy id, effect, decision, message, facts used, and missing facts.
evals: evals/cases.yaml
compatible_hosts:
  - claude-code
  - claude-managed-agents
  - codex
  - gemini
  - portable
host_editions:
  claude-code:
    - enterprise-edition
  claude-managed-agents:
    - enterprise-edition
mutations: []
required_endor_mcp_tools:
  - check_dependency_for_risks
  - check_dependency_for_vulnerabilities
  - get_endor_vulnerability
endorctl_agent_api_invocations:
  - lookup_package_version_uuid
  - get_package_scores
  - get_package_license
instructions_path: instructions.md
model: sonnet
requires_endor_mcp: ">=2.4"
requires_endorctl: ">=1.0.0"
