recipe_schema_version: 1
id: dependency-decision-helper
name: Dependency Decision Helper
version: 1.0.0
description: |
  Use this agent when the user asks whether to add, upgrade, or use a specific
  package version. Examples: "Is lodash 4.17.20 safe?", "Should I use requests
  2.28.0?", "Check log4j-core 2.14.1 before I add it." Returns a dependency
  verdict with evidence, conditions, alternatives, and any data gaps.
safety_class: read_only
endor_tier_minimum: free
supported_transports:
  - mcp
  - endorctl_api
host_capabilities_required:
  run_commands: true
  read_files: false
  write_files: false
  open_pr: false
inputs:
  - name: ecosystem
    kind: string
    required: true
    description: Package ecosystem, such as npm, pypi, maven, go, cargo, gem, nuget, or packagist.
  - name: package_name
    kind: string
    required: true
    description: Exact package name as it appears in a manifest.
  - name: version
    kind: string
    required: true
    description: Exact package version to assess.
outputs:
  - name: verdict
    kind: enum
    required: true
    description: SAFE, SAFE_WITH_CONDITIONS, NOT_RECOMMENDED, or BLOCKED.
  - name: conditions
    kind: list[string]
    required: true
    description: Evidence-backed conditions that explain the verdict.
  - name: alternatives
    kind: list[string]
    required: true
    description: Safer package names or versions when available.
  - name: summary
    kind: string
    required: true
    description: One-paragraph human-readable assessment.
  - name: data_gaps
    kind: list[string]
    required: true
    description: Signals that were unavailable because setup, auth, edition, or tooling was missing.
evals: evals/cases.yaml
compatible_hosts:
  - claude-code
  - claude-managed-agents
mutations: []
required_endor_mcp_tools:
  - check_dependency_for_risks
  - check_dependency_for_vulnerabilities
  - get_endor_vulnerability
endorctl_api_invocations:
  - lookup_package_version_uuid
  - get_package_scores
  - get_package_license
  - query_similar_packages
instructions_path: instructions.md
model: sonnet
requires_endor_mcp: ">=2.4"
requires_endorctl: ">=1.0"
