schema_version: 1
agent_id: configuration-automation
plans:
  - profile_id: evidence-check
    safety_class: read_only
    scope:
      namespace_required: true
      namespace_provenance_required: true
    freshness:
      max_age_seconds: 300
    cache_identity:
      - agent_id
      - profile_id
      - namespace
      - repo_full_name
      - source_digest
    attribution:
      required: true
      agent_id: <agent-id>
    execution:
      mode: prompt_fallback
      prompt_recipes_exposed: true
      host_adapter_required: true
    gate:
      expected_calls: 1
      max_calls: 2
      stop_conditions:
        - Stop after one selected repository's local setup context and Endor branch coverage are known, ambiguous, or precisely blocked.
        - Do not enumerate an organization or tenant unless the user explicitly selects a separate exhaustive inventory mode.
      data_gaps_required: true
    routes:
      - id: default
        condition: always
        exclusive_group: evidence-check
        expected_calls: 1
        max_calls: 2
        required_outputs:
          - steps.repo-setup-file-inventory.manifests
          - steps.project-branch-coverage.projects
    steps:
      - id: repo-setup-file-inventory
        recipe_id: repo-setup-file-inventory
        canonical_recipe_id: local-manifest-inventory
        operation: local_read
        route_id: default
        condition: always
        concurrency_group: coverage
        depends_on: []
        max_calls: 0
        inputs: []
        outputs:
          - name: manifests
            path: $.manifest_paths
            type: array
      - id: project-branch-coverage
        recipe_id: project-branch-coverage
        canonical_recipe_id: project-branch-coverage
        operation: list
        route_id: default
        condition: always
        concurrency_group: coverage
        depends_on: []
        max_calls: 2
        pagination:
          page_size: 2
          max_pages: 1
        retry:
          eligible: true
          max_attempts: 2
          when: parent_namespace_empty_result
          append_args:
            - --traverse
        inputs:
          - name: namespace
            placeholder: namespace
            source: runtime.namespace
            type: string
          - name: repo_full_name
            placeholder: owner/repo
            source: runtime.repo_full_name
            type: string
        outputs:
          - name: projects
            path: $.objects
            type: array
