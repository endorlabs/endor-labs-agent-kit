schema_version: 1
agent_id: findings-browser
plans:
  - profile_id: browse
    safety_class: read_only
    scope:
      namespace_required: true
      namespace_provenance_required: true
    freshness:
      max_age_seconds: 300
    cache_identity:
      - agent_id
      - profile_id
      - namespace
      - scope_filter
      - levels
      - finding_category
      - finding_tag
      - source_digest
    attribution:
      required: true
      agent_id: <agent-id>
    execution:
      mode: prompt_fallback
      prompt_recipes_exposed: true
      host_adapter_required: true
    gate:
      expected_calls: 1
      max_calls: 1
      stop_conditions:
        - Stop after one bounded page for the exact requested filter or tag is returned, empty, or precisely blocked.
        - Report pagination and truncation; do not silently expand into complete inventory mode.
      data_gaps_required: true
    routes:
      - id: tag
        condition: runtime.finding_tag_present
        exclusive_group: finding-selector
        expected_calls: 1
        max_calls: 1
        required_outputs:
          - steps.findings-by-tag.findings
      - id: filtered
        condition: runtime.finding_tag_absent
        exclusive_group: finding-selector
        expected_calls: 1
        max_calls: 1
        required_outputs:
          - steps.filtered-findings.findings
    steps:
      - id: findings-by-tag
        recipe_id: finding-browser-by-tag
        canonical_recipe_id: finding-browser-by-tag
        operation: list
        route_id: tag
        condition: always
        concurrency_group: findings-page
        depends_on: []
        max_calls: 1
        pagination:
          page_size: 25
          max_pages: 1
        inputs:
          - name: namespace
            placeholder: namespace
            source: runtime.namespace
            type: string
          - name: scope_filter
            placeholder: SCOPE_FILTER
            source: runtime.scope_filter
            type: string
          - name: finding_tag
            placeholder: FINDING_TAG
            source: runtime.finding_tag
            type: string
        outputs:
          - name: findings
            path: $.objects
            type: array
      - id: filtered-findings
        recipe_id: finding-browser-filtered
        canonical_recipe_id: finding-browser-filtered
        operation: list
        route_id: filtered
        condition: always
        concurrency_group: findings-page
        depends_on: []
        max_calls: 1
        pagination:
          page_size: 25
          max_pages: 1
        inputs:
          - name: namespace
            placeholder: namespace
            source: runtime.namespace
            type: string
          - name: scope_filter
            placeholder: SCOPE_FILTER
            source: runtime.scope_filter
            type: string
          - name: levels
            placeholder: LEVELS
            source: runtime.levels
            type: string
          - name: finding_category
            placeholder: FINDING_CATEGORY
            source: runtime.finding_category
            type: string
        outputs:
          - name: findings
            path: $.objects
            type: array
