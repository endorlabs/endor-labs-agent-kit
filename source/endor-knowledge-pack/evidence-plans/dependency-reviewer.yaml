schema_version: 1
agent_id: dependency-reviewer
plans:
  - profile_id: repository-review
    safety_class: read_only
    scope:
      namespace_required: true
      namespace_provenance_required: true
    freshness:
      max_age_seconds: 300
    cache_identity:
      - agent_id
      - profile_id
      - namespace
      - repo_full_name
      - source_digest
    attribution:
      required: true
      agent_id: <agent-id>
    execution:
      mode: prompt_fallback
      prompt_recipes_exposed: true
      host_adapter_required: true
    gate:
      expected_calls: 2
      max_calls: 3
      stop_conditions:
        - Stop after local manifest context and complete scoped package-by-severity finding groups are known or precisely blocked.
        - Do not expand every dependency into separate OSS or Finding calls in the default repository review.
      data_gaps_required: true
    routes:
      - id: default
        condition: always
        exclusive_group: repository-review
        expected_calls: 2
        max_calls: 3
        required_outputs:
          - steps.local-manifest-inventory.manifests
          - steps.project-by-git.project_uuid
          - steps.finding-package-severity-groups.groups
    steps:
      - id: local-manifest-inventory
        recipe_id: local-manifest-inventory
        canonical_recipe_id: local-manifest-inventory
        operation: local_read
        route_id: default
        condition: always
        concurrency_group: scope
        depends_on: []
        max_calls: 0
        inputs: []
        outputs:
          - name: manifests
            path: $.manifest_paths
            type: array
      - id: project-by-git
        recipe_id: project-by-git
        canonical_recipe_id: project-by-git
        operation: list
        route_id: default
        condition: always
        concurrency_group: scope
        depends_on: []
        max_calls: 2
        pagination:
          page_size: 2
          max_pages: 1
        retry:
          eligible: true
          max_attempts: 2
          when: parent_namespace_empty_result
          append_args:
            - --traverse
        inputs:
          - name: namespace
            placeholder: namespace
            source: runtime.namespace
            type: string
          - name: repo_full_name
            placeholder: owner/repo
            source: runtime.repo_full_name
            type: string
        outputs:
          - name: project_uuid
            path: $.objects[0].uuid
            type: string
          - name: project_name
            path: $.objects[0].meta.name
            type: string
          - name: git
            path: $.objects[0].spec.git
            type: object
      - id: finding-package-severity-groups
        recipe_id: sca-finding-package-severity-groups
        canonical_recipe_id: sca-finding-package-severity-groups
        operation: list
        route_id: default
        condition: always
        concurrency_group: findings
        depends_on:
          - project-by-git
        max_calls: 1
        inputs:
          - name: namespace
            placeholder: namespace
            source: runtime.namespace
            type: string
          - name: project_uuid
            placeholder: PROJECT_UUID
            source: steps.project-by-git.project_uuid
            type: string
        outputs:
          - name: groups
            path: $.group_response.groups
            type: array
          - name: count
            path: $.aggregation_count.count
            type: integer
