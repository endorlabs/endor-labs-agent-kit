agent_id: package-risk-summary
title: Package Risk Summary Evidence Contract
summary: Summarize one explicit package version's risk posture without turning unavailable evidence into an approval or rejection.
task_profiles:
  - id: explain
    title: Explain Package Risk
    summary: Summarize risk for one explicit package coordinate from available evidence only.
    when_to_use:
      - The user asks for a concise risk posture for a package version.
      - Missing package coordinate details would make tenant lookups ambiguous.
    minimal_evidence:
      - Ecosystem, package name, version, and namespace provenance for tenant-scoped evidence when available.
    stop_when:
      - Package coordinate is complete, or missing coordinate/evidence is recorded in data_gaps.
      - Do not inspect repository manifests or run scans.
    output_focus:
      - Return risk_posture, findings, strengths, next_checks, summary, evidence_queries, and data_gaps.
  - id: evidence-check
    title: Exact Package Evidence Check
    summary: Fetch only exact package-version enrichment before selecting a posture.
    when_to_use:
      - The host exposes Endor PackageVersion, Metric, or Vulnerability evidence.
      - The user asks for evidence-backed risk, not a general explanation.
    minimal_evidence:
      - Exact PackageVersion match, available score/license signals, vulnerability enrichment, and data_gaps for unavailable
        evidence.
    stop_when:
      - Evidence-backed posture is known or evidence is insufficient.
      - Do not substitute ecosystem-level assumptions for exact package-version evidence.
    output_focus:
      - Return bounded posture, evidence_queries, evidence source summary, and data_gaps.
resources:
  - name: PackageVersion
    purpose: Resolve the exact package-version UUID for package-level enrichment.
    fields:
      - uuid
      - meta.name
  - name: Metric
    purpose: Read scorecard and license signals for the exact package version.
    fields:
      - spec.metric_values
  - name: Vulnerability
    purpose: Enrich exact vulnerability identifiers when the host exposes Endor vulnerability evidence.
    fields:
      - uuid
      - spec
retrieval_steps:
  - Require ecosystem, package name, and version before risk posture selection.
  - Resolve namespace provenance before tenant-scoped Endor lookups; do not infer namespace from local files or earlier sessions.
  - Use host-exposed Endor MCP tools only when available; otherwise report unavailable Endor risk evidence in data_gaps.
  - Resolve exact PackageVersion evidence before score, license, and package-health claims.
fallbacks:
  - If only partial vulnerability evidence is available, summarize that evidence and label the posture as evidence-limited.
  - If no usable Endor evidence is available, return `UNKNOWN` with precise missing signals.
data_gaps:
  - Record missing MCP tools, credentials, package-version UUID, scores, license, typosquat similarity, firewall history,
    vulnerability lists, and vulnerability enrichment in `data_gaps`.
  - Preserve exact package coordinate and evidence source in the final output.
  - When evidence is missing, ask for existing package/version, finding, scan-result, project-scope, or user-provided evidence;
    do not recommend running a new Endor scan as the default next check.
evidence_query_plans:
  - profile_id: explain
    title: Package Risk Summary Query Plan
    objective: Summarize risk for one named package/version without whole-project expansion.
    query_order:
      - Resolve package coordinate, version, ecosystem, namespace, and optional repository context.
      - Query PackageVersion or package metadata for the named package/version.
      - Query scoped Finding or available Endor risk evidence only for that package when project context is present.
    avoid:
      - Do not list all repository dependencies or all tenant package versions.
    stop_after:
      - Stop after the package risk summary has verified risk signals and caveats.
    data_gaps:
      - Record missing package version, unavailable package metadata, missing project scope, and absent finding evidence in
        data_gaps.
  - profile_id: evidence-check
    title: Package Risk Evidence Query Plan
    objective: Verify whether package-specific Endor evidence is available.
    query_order:
      - Resolve namespace and package coordinate first.
      - Query only exact package/version metadata.
      - If repository scope is supplied, query narrow package-linked Finding evidence.
    avoid:
      - Do not infer risk from local lockfiles alone or from unrelated package names.
    stop_after:
      - Stop after package evidence is available, unavailable, or ambiguous.
    data_gaps:
      - Record ambiguous coordinates, missing namespace, absent PackageVersion, and unavailable project-scoped Findings in
        data_gaps.
evidence_query_recipes:
  - profile_id: explain
    id: package-version-exact
    canonical_id: package-version-exact
    resource: PackageVersion
    purpose: Fetch exact package-version risk metadata for a named package only.
    template: endorctl api list -r PackageVersion -n <namespace> --filter 'spec.ecosystem=="<ECOSYSTEM>" and spec.package_name=="<PACKAGE_NAME>"
      and spec.version=="<VERSION>"' --field-mask "uuid,meta.name,spec.ecosystem,spec.package_name,spec.version" -o json
    fields:
      - uuid
      - meta.name
      - spec.ecosystem
      - spec.package_name
      - spec.version
    constraints:
      - Use exact package coordinates; do not inventory the whole repository when a package is named.
      - If version is unknown, ask for it or report data_gaps.
  - profile_id: explain
    id: package-finding-evidence
    canonical_id: sca-finding-availability
    resource: Finding
    purpose: Check scoped vulnerability Finding availability without fetching full finding bodies.
    template: endorctl api list -r Finding -n <namespace> --filter 'context.type==CONTEXT_TYPE_MAIN and spec.project_uuid=="<PROJECT_UUID>"
      and spec.finding_categories contains FINDING_CATEGORY_VULNERABILITY and spec.dismiss==false' --field-mask "uuid,context.type,spec.project_uuid,spec.target_dependency_package_name,spec.level"
      -o json
    fields:
      - uuid
      - context.type
      - spec.project_uuid
      - spec.target_dependency_package_name
      - spec.level
    constraints:
      - Use for availability or selected-candidate reconciliation only.
      - Do not add --list-all for selection-plan discovery before VersionUpgrade narrowing.
  - profile_id: evidence-check
    id: package-version-exact
    canonical_id: package-version-exact
    resource: PackageVersion
    purpose: Fetch exact package-version risk metadata for a named package only.
    template: endorctl api list -r PackageVersion -n <namespace> --filter 'spec.ecosystem=="<ECOSYSTEM>" and spec.package_name=="<PACKAGE_NAME>"
      and spec.version=="<VERSION>"' --field-mask "uuid,meta.name,spec.ecosystem,spec.package_name,spec.version" -o json
    fields:
      - uuid
      - meta.name
      - spec.ecosystem
      - spec.package_name
      - spec.version
    constraints:
      - Use exact package coordinates; do not inventory the whole repository when a package is named.
      - If version is unknown, ask for it or report data_gaps.
  - profile_id: evidence-check
    id: package-finding-evidence-check
    canonical_id: sca-finding-availability
    resource: Finding
    purpose: Check scoped vulnerability Finding availability without fetching full finding bodies.
    template: endorctl api list -r Finding -n <namespace> --filter 'context.type==CONTEXT_TYPE_MAIN and spec.project_uuid=="<PROJECT_UUID>"
      and spec.finding_categories contains FINDING_CATEGORY_VULNERABILITY and spec.dismiss==false' --field-mask "uuid,context.type,spec.project_uuid,spec.target_dependency_package_name,spec.level"
      -o json
    fields:
      - uuid
      - context.type
      - spec.project_uuid
      - spec.target_dependency_package_name
      - spec.level
    constraints:
      - Use for availability or selected-candidate reconciliation only.
      - Do not add --list-all for selection-plan discovery before VersionUpgrade narrowing.
