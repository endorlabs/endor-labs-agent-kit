agent_id: repository-dependency-reviewer
title: Repository Dependency Review Evidence Contract
summary: Inspect local dependency manifests read-only, resolve exact package coordinates, and use only host-exposed Endor
  risk evidence.
task_profiles:
  - id: manifest-inventory
    title: Manifest Inventory
    summary: Discover dependency manifests and exact direct coordinates without Endor risk lookups.
    when_to_use:
      - The user asks what dependencies are present or the repository scope is unclear.
      - Host access to Endor evidence is unavailable.
    minimal_evidence:
      - Repository root, manifest paths, ecosystem detection, and exact direct dependency versions when available.
    stop_when:
      - Manifest inventory is complete or unsupported formats are recorded in data_gaps.
      - Do not claim Endor risk or vulnerability state from local manifests alone.
    output_focus:
      - Return manifests, dependencies_reviewed, skipped coordinates, summary, evidence_queries, and data_gaps.
  - id: evidence-check
    title: Dependency Risk Evidence Check
    summary: Check exact manifest coordinates against available Endor risk evidence.
    when_to_use:
      - The user asks for dependency review with Endor evidence.
      - Exact package versions were resolved from manifests or user input.
    minimal_evidence:
      - Exact direct coordinates, namespace provenance for tenant-scoped checks, and available PackageRisk or Vulnerability
        evidence.
    stop_when:
      - Reviewed coordinates have evidence-backed findings or precise data_gaps.
      - Do not expand into repository-wide remediation planning unless asked.
    output_focus:
      - Return findings, recommended_actions, evidence_queries, evidence source summary, and data_gaps.
resources:
  - name: RepositoryManifest
    purpose: Discover dependency files and exact direct package coordinates from read-only file inspection.
    fields:
      - path
      - ecosystem
      - package_name
      - version
  - name: PackageRisk
    purpose: Check exact dependency coordinates through available Endor risk evidence.
    fields:
      - risk_flags
      - vulnerability_ids
      - recommendations
  - name: Vulnerability
    purpose: Enrich vulnerability identifiers when the host exposes Endor vulnerability evidence.
    fields:
      - id
      - severity
      - epss
      - cisa_kev
retrieval_steps:
  - Identify the repository root from host context or an explicit repository path before asking for a path.
  - Resolve namespace provenance before tenant-scoped Endor lookups; do not infer namespace from local files or earlier sessions.
  - Review exact direct dependency coordinates first and do not send approximate or unresolved versions to Endor.
  - Use Endor MCP/risk tools only when the host exposes them; otherwise record unavailable evidence and continue with manifest
    evidence only.
fallbacks:
  - If the host cannot inspect files, ask for a repository path or manifest content and report the host capability gap.
  - If exact versions cannot be resolved, return `UNKNOWN` or bounded risk posture with unresolved version data_gaps.
data_gaps:
  - Record missing repository access, unsupported manifest formats, unresolved versions, unavailable Endor risk tools, vulnerability
    enrichment gaps, and account capability gaps in `data_gaps`.
  - Preserve manifest paths, exact package coordinates reviewed, and skipped coordinates with reasons.
evidence_query_plans:
  - profile_id: manifest-inventory
    title: Manifest Inventory Query Plan
    objective: Inventory local manifests before Endor expansion.
    query_order:
      - Read repository root, package-manager files, lockfiles, and workspace layout.
      - Resolve namespace and project only when the user asks for Endor-backed risk evidence.
      - Map manifests to package ecosystems and likely direct dependencies.
    avoid:
      - Do not query broad Endor Finding or PackageVersion inventories before manifest scope is known.
    stop_after:
      - Stop after manifest inventory and evidence needs are clear.
    data_gaps:
      - Record missing lockfiles, unreadable manifests, unresolved workspace layout, and unavailable namespace/project evidence
        in data_gaps.
  - profile_id: evidence-check
    title: Repository Dependency Evidence Query Plan
    objective: Attach Endor risk evidence only to discovered repository dependencies.
    query_order:
      - Start from local manifest inventory and resolved project scope.
      - Query package or dependency summaries for dependencies present in the repository.
      - Query scoped Finding evidence only for risky or user-selected packages.
    avoid:
      - Do not turn this into a tenant-wide package or finding export.
      - Do not recommend running a new scan as the default next step.
    stop_after:
      - Stop after reviewed dependencies are categorized with verified evidence or data_gaps.
    data_gaps:
      - Record missing project evidence, unavailable dependency metadata, packages without matching Endor evidence, and skipped
        broad Findings in data_gaps.
evidence_query_recipes:
  - profile_id: manifest-inventory
    id: local-manifest-inventory
    resource: local-files
    purpose: Inventory dependency manifests before scoped Endor expansion.
    template: find . -maxdepth 4 -type f \( -name 'pom.xml' -o -name 'build.gradle' -o -name 'package.json' -o -name 'go.mod'
      -o -name 'requirements*.txt' -o -name 'pyproject.toml' \) -print
    fields:
      - manifest_path
      - ecosystem_hint
    constraints:
      - Use local files as context only until Endor evidence backs project-scoped risk.
  - id: project-by-git
    resource: Project
    purpose: Resolve the current repository to a namespace-scoped Endor project with only identity fields.
    template: endorctl api list -r Project -n <namespace> --filter 'spec.git.full_name=="<owner/repo>"' --field-mask "uuid,meta.name,meta.parent_uuid,spec.git"
      --list-all -o json
    fields:
      - uuid
      - meta.name
      - meta.parent_uuid
      - spec.git
    constraints:
      - Use the namespace selected by the preflight.
      - Retry with --traverse only for the same proven namespace before reporting data_gaps.
    profile_id: manifest-inventory
  - profile_id: evidence-check
    id: local-manifest-inventory
    resource: local-files
    purpose: Inventory dependency manifests before scoped Endor expansion.
    template: find . -maxdepth 4 -type f \( -name 'pom.xml' -o -name 'build.gradle' -o -name 'package.json' -o -name 'go.mod'
      -o -name 'requirements*.txt' -o -name 'pyproject.toml' \) -print
    fields:
      - manifest_path
      - ecosystem_hint
    constraints:
      - Use local files as context only until Endor evidence backs project-scoped risk.
  - profile_id: evidence-check
    id: package-version-exact
    resource: PackageVersion
    purpose: Fetch exact package-version risk metadata for a named package only.
    template: endorctl api list -r PackageVersion -n <namespace> --filter 'spec.ecosystem=="<ECOSYSTEM>" and spec.package_name=="<PACKAGE_NAME>"
      and spec.version=="<VERSION>"' --field-mask "uuid,meta.name,spec.ecosystem,spec.package_name,spec.version" -o json
    fields:
      - uuid
      - meta.name
      - spec.ecosystem
      - spec.package_name
      - spec.version
    constraints:
      - Use exact package coordinates; do not inventory the whole repository when a package is named.
      - If version is unknown, ask for it or report data_gaps.
  - profile_id: evidence-check
    id: selected-package-finding-evidence
    resource: Finding
    purpose: Check scoped vulnerability Finding availability without fetching full finding bodies.
    template: endorctl api list -r Finding -n <namespace> --filter 'context.type==CONTEXT_TYPE_MAIN and spec.project_uuid=="<PROJECT_UUID>"
      and spec.finding_categories contains FINDING_CATEGORY_VULNERABILITY and spec.dismiss==false' --field-mask "uuid,context.type,spec.project_uuid,spec.target_dependency_package_name,spec.level"
      -o json
    fields:
      - uuid
      - context.type
      - spec.project_uuid
      - spec.target_dependency_package_name
      - spec.level
    constraints:
      - Use for availability or selected-candidate reconciliation only.
      - Do not add --list-all for selection-plan discovery before VersionUpgrade narrowing.
