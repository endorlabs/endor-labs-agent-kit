agent_id: upgrade-impact-analysis
title: Upgrade Impact Analysis Evidence Contract
summary: Explain upgrade impact from Endor VersionUpgrade/UIA evidence and refuse compatibility claims without platform or
  user-provided evidence.
task_profiles:
  - id: resolve-scope
    title: Resolve Upgrade Scope
    summary: Prove project, package, current version, and target version scope before impact claims.
    when_to_use:
      - The user asks about an upgrade but project or package scope is incomplete.
      - A finding UUID or package coordinate must be mapped first.
    minimal_evidence:
      - Namespace provenance, project or package coordinate, current version, and target version or finding selector.
    stop_when:
      - Upgrade scope is explicit or missing evidence is recorded in data_gaps.
      - Do not claim safety or breaking-change status in this profile.
    output_focus:
      - Return scope summary, evidence_queries, and data_gaps.
  - id: evidence-check
    title: Upgrade Evidence Check
    summary: Query VersionUpgrade/UIA evidence for one explicit upgrade candidate.
    when_to_use:
      - The user asks whether an upgrade is safe, risky, or worth doing.
      - A read-only host check needs upgrade-impact evidence without remediation planning.
    minimal_evidence:
      - Resolved project, VersionUpgrade/UIA row for the candidate, and Finding cross-check when a finding UUID is supplied.
    stop_when:
      - Risk, CIA, fixed findings, introduced findings, and missing evidence are known.
      - Do not edit manifests or create remediation branches.
    output_focus:
      - Return upgrade_recommendation, risk_delta, reasons, breaking_change_notes, next_checks, evidence_queries, and data_gaps.
  - id: explain
    title: Explain Impact
    summary: Explain verified upgrade impact in concise user-facing terms.
    when_to_use:
      - The user asks for a readable explanation of already-fetched VersionUpgrade evidence.
      - Evidence was supplied by the user or a prior current lookup in the same run.
    minimal_evidence:
      - Current VersionUpgrade/UIA evidence or a clear data_gaps entry that evidence is unavailable.
    stop_when:
      - The explanation covers risk, CIA, findings fixed/introduced, and validation next checks.
      - Do not infer compatibility from version numbers alone.
    output_focus:
      - Return concise explanation plus structured recommendation, evidence_queries, and data_gaps.
resources:
  - name: Project
    purpose: Resolve namespace-scoped project identity before project upgrade recommendations.
    fields:
      - uuid
      - meta.name
      - spec.git
  - name: VersionUpgrade
    purpose: Read Endor UIA/CIA upgrade recommendations and selected upgrade details.
    fields:
      - uuid
      - spec.upgrade_info
  - name: Finding
    purpose: Cross-check finding-specific fixing upgrades when a finding UUID is supplied.
    fields:
      - uuid
      - context.type
      - spec.project_uuid
      - spec.target_uuid
retrieval_steps:
  - Resolve project and namespace provenance before project-scoped VersionUpgrade queries.
  - Use VersionUpgrade as the source of truth for risk, CIA, findings fixed, findings introduced, manifest targets, and Endor
    Patch availability.
  - Keep current-version, target-version, and non-main-context evidence separate.
fallbacks:
  - If project resolution or VersionUpgrade evidence is unavailable, return `INSUFFICIENT_DATA` and do not infer upgrade safety
    from version numbers.
  - If compatibility evidence is missing, put that in breaking-change notes and data_gaps.
data_gaps:
  - Record missing namespace, project resolution, VersionUpgrade records, CIA details, finding-specific fix maps, source context,
    and host command capability in `data_gaps`.
  - Preserve `namespace_provenance`, project query attempts, upgrade UUIDs, and context scope in the final output.
  - Keep top-level `findings_fixed` and `findings_introduced` as integer counts, `fixed_cves` as advisory IDs, and `endor_patch`
    as a string target, `none`, or `unknown`, never a boolean.
evidence_query_plans:
  - profile_id: resolve-scope
    title: Upgrade Impact Scope Query Plan
    objective: Resolve namespace, project, package, and upgrade selectors before impact analysis.
    query_order:
      - Read supplied package, current version, target version, upgrade UUID, repository, and namespace selectors.
      - Resolve Project only when repository-scoped VersionUpgrade evidence is requested.
      - Normalize package coordinate and ecosystem for VersionUpgrade filtering.
    avoid:
      - Do not list unrelated VersionUpgrade records or repository Findings during scope resolution.
    stop_after:
      - Stop after selectors are exact enough for a VersionUpgrade lookup or data_gaps explain what is missing.
    data_gaps:
      - Record missing package coordinate, target version, namespace, project, or upgrade UUID in data_gaps.
  - profile_id: evidence-check
    title: Upgrade Impact Evidence Query Plan
    objective: Verify VersionUpgrade/UIA impact evidence for a scoped package or candidate.
    query_order:
      - Resolve namespace, package/version, and optional project scope first.
      - Query VersionUpgrade summaries matching the package and from/to versions or upgrade UUID.
      - Fetch detailed VersionUpgrade evidence only for the selected candidate.
    avoid:
      - Do not query broad Findings to estimate upgrade impact when VersionUpgrade is the source of truth.
    stop_after:
      - Stop after VersionUpgrade evidence is found, absent, ambiguous, or inaccessible.
    data_gaps:
      - Record absent VersionUpgrade evidence, missing CIA fields, ambiguous package versions, and unavailable namespace/project
        reads in data_gaps.
  - profile_id: explain
    title: Upgrade Impact Explanation Query Plan
    objective: Explain one selected upgrade impact using VersionUpgrade detail and minimal local usage context.
    query_order:
      - Start from the selected VersionUpgrade candidate or exact package/from/to selectors.
      - Fetch detailed VersionUpgrade evidence including risk, CIA, findings fixed, findings introduced, conflicts, and manifest
        fields.
      - Inspect only matching local manifest/source usage when repository context is available and risk needs explanation.
    avoid:
      - Do not produce broad remediation planning or PR mutation steps unless the user switches to remediation.
    stop_after:
      - Stop after impact, confidence, validation needs, and caveats are explained.
    data_gaps:
      - Record missing VersionUpgrade detail, unavailable local usage, missing CIA evidence, and unverified upstream latest-version
        claims in data_gaps.
evidence_query_recipes:
  - id: project-by-git
    canonical_id: project-by-git
    resource: Project
    purpose: Resolve the current repository to a namespace-scoped Endor project with only identity fields.
    template: endorctl api list -r Project -n <namespace> --filter 'spec.git.full_name=="<owner/repo>"' --field-mask "uuid,meta.name,meta.parent_uuid,spec.git"
      --list-all -o json
    fields:
      - uuid
      - meta.name
      - meta.parent_uuid
      - spec.git
    constraints:
      - Use the namespace selected by the preflight.
      - Retry with --traverse only for the same proven namespace before reporting data_gaps.
    profile_id: resolve-scope
  - profile_id: resolve-scope
    id: version-upgrade-by-package
    canonical_id: version-upgrade-by-package
    resource: VersionUpgrade
    purpose: Fetch UIA impact candidates for one package/from/to selector.
    template: endorctl api list -r VersionUpgrade -n <namespace> --filter 'context.type==CONTEXT_TYPE_MAIN and spec.project_uuid=="<PROJECT_UUID>"
      and spec.upgrade_info.direct_dependency_package=="<PACKAGE_NAME>"' --field-mask "uuid,spec.name,spec.upgrade_info" -o
      json
    fields:
      - uuid
      - spec.name
      - spec.upgrade_info
    constraints:
      - Filter by the selected package or exact upgrade selector.
      - Do not query broad Findings to estimate upgrade impact.
  - profile_id: evidence-check
    id: version-upgrade-by-package
    canonical_id: version-upgrade-by-package
    resource: VersionUpgrade
    purpose: Fetch UIA impact candidates for one package/from/to selector.
    template: endorctl api list -r VersionUpgrade -n <namespace> --filter 'context.type==CONTEXT_TYPE_MAIN and spec.project_uuid=="<PROJECT_UUID>"
      and spec.upgrade_info.direct_dependency_package=="<PACKAGE_NAME>"' --field-mask "uuid,spec.name,spec.upgrade_info" -o
      json
    fields:
      - uuid
      - spec.name
      - spec.upgrade_info
    constraints:
      - Filter by the selected package or exact upgrade selector.
      - Do not query broad Findings to estimate upgrade impact.
  - profile_id: evidence-check
    id: version-upgrade-detail
    canonical_id: version-upgrade-detail
    resource: VersionUpgrade
    purpose: Fetch detailed UIA/CIA evidence for only the selected upgrade candidate.
    template: endorctl api list -r VersionUpgrade -n <namespace> --filter 'context.type==CONTEXT_TYPE_MAIN and spec.project_uuid=="<PROJECT_UUID>"
      and uuid=="<VERSION_UPGRADE_UUID>"' --field-mask "uuid,spec.name,spec.upgrade_info" -o
      json
    fields:
      - uuid
      - spec.name
      - spec.upgrade_info
    constraints:
      - Use after candidate summary ranking.
      - If detail is unavailable, keep the result blocked or plan-only and record data_gaps.
  - profile_id: explain
    id: version-upgrade-detail
    canonical_id: version-upgrade-detail
    resource: VersionUpgrade
    purpose: Fetch detailed UIA/CIA evidence for only the selected upgrade candidate.
    template: endorctl api list -r VersionUpgrade -n <namespace> --filter 'context.type==CONTEXT_TYPE_MAIN and spec.project_uuid=="<PROJECT_UUID>"
      and uuid=="<VERSION_UPGRADE_UUID>"' --field-mask "uuid,spec.name,spec.upgrade_info" -o
      json
    fields:
      - uuid
      - spec.name
      - spec.upgrade_info
    constraints:
      - Use after candidate summary ranking.
      - If detail is unavailable, keep the result blocked or plan-only and record data_gaps.
  - profile_id: explain
    id: selected-source-usage
    canonical_id: selected-source-usage
    resource: local-files
    purpose: Inspect only selected package usage for compatibility and validation planning.
    template: rg -n '<PACKAGE_NAME>|<IMPORT_OR_SYMBOL>' <SELECTED_MANIFEST_OR_SOURCE_DIR>
    fields:
      - file
      - line
      - symbol
      - selected_package
    constraints:
      - Run only after one package is selected.
      - Do not scan unrelated source trees when the profile only needs a gate result.
