agent_id: ai-sast-remediation
title: AI SAST Remediation Evidence Contract
summary: Use namespace-scoped main-context AI SAST findings, exploit reproduction, remediation guidance, and source evidence
  before proposing remediation or optional exception work.
task_profiles:
  - id: resolve-scope
    compact: true
    output_fields:
      - summary
      - project_resolution
      - evidence_queries
      - data_gaps
      - policy_context
      - policy_evaluations
    included_sections:
      - scope-resolution
    title: Resolve Scope
    summary: Prove namespace, repository, project, source ref, and AI SAST finding scope only.
    when_to_use:
      - The user gives a repository or finding reference and asks what Endor scope applies.
      - A patch or exception decision would be premature.
    minimal_evidence:
      - Namespace provenance plus one exact Finding lookup when a Finding UUID is supplied; otherwise one repository-scoped
        Project lookup.
    stop_when:
      - Project and finding scope are resolved or blocked with precise data_gaps.
      - Do not inspect source files or propose patches in this profile.
    output_focus:
      - Return project resolution, finding selector attempts, evidence_queries, and data_gaps.
  - id: evidence-check
    compact: true
    output_fields:
      - summary
      - project_resolution
      - evidence_queries
      - verdicts
      - data_gaps
      - policy_context
      - policy_evaluations
    included_sections:
      - scope-resolution
    title: Evidence Check
    summary: Fetch only the AI SAST evidence needed to classify availability; fetch detailed case-file context only for a selected finding.
    when_to_use:
      - The user asks whether a finding is actionable, reproducible, or has enough context.
      - A read-only host check needs evidence discipline without patch generation.
    minimal_evidence:
      - One exact Finding when a Finding UUID is supplied, with a conditional Project-by-UUID lookup only when repository identity
        is absent; otherwise one Project lookup followed by one main-context AI SAST count.
    stop_when:
      - The exact Finding scope is known, or the project-scoped AI SAST count is known when no Finding UUID was supplied.
      - Do not fetch source files, Finding explanations, or finding inventories in this profile.
      - Do not generate diffs, policies, or change requests unless the user asks for remediation.
    output_focus:
      - Return verdict placeholders, evidence_queries, availability counts, and data_gaps for missing finding detail or source evidence.
  - id: selection-plan
    compact: true
    included_sections:
      - scope-resolution
      - selection-planning
    title: Remediation Plan
    summary: Decide whether to patch, request approval, or block based on verified AI SAST and source evidence.
    when_to_use:
      - The user asks for triage plus a remediation path.
      - The finding has source context and remediation guidance.
    minimal_evidence:
      - AI SAST Finding, exploit reproduction or explicit absence, remediation guidance, source file at pinned ref, and sibling-file
        context.
    stop_when:
      - A TRUE_POSITIVE, FALSE_POSITIVE, ACCEPT_RISK, or insufficient-evidence verdict is recorded.
      - Do not open PRs or create policies without explicit approval.
    output_focus:
      - Return verdicts, patch plan or exception lane, validation plan, change_requests, evidence_queries, and data_gaps.
resources:
  - name: Project
    purpose: Resolve the Endor project and repository identity from namespace-scoped metadata.
    fields:
      - uuid
      - meta.name
      - meta.parent_uuid
      - spec.git
  - name: Finding
    purpose: Query AI SAST findings with source context, severity, exploit reproduction, and remediation guidance.
    fields:
      - uuid
      - context.type
      - spec.project_uuid
      - spec.method
      - spec.source_code_version
      - spec.finding_metadata
      - spec.dependency_file_paths
  - name: Policy
    purpose: Check existing exception policies only when the user enters the optional exception lane.
    fields:
      - uuid
      - meta.name
      - spec.project_selector
      - spec.policy_type
      - spec.exception
      - spec.query_statements
      - spec.rule
retrieval_steps:
  - Inspect supplied context manifests or local `.endorlabs-context` snapshots before live Endor lookups and confirm namespace,
    project UUID, source ref, and finding UUID freshness.
  - When a Finding UUID is supplied, fetch that Finding first and derive project UUID, context type, and source ref; fetch Project
    by the returned UUID only when repository identity is still absent.
  - When no Finding UUID is supplied, resolve project identity from repository metadata, then count `Finding` records with
    `context.type==CONTEXT_TYPE_MAIN`, `spec.project_uuid`, and `spec.method=="SYSTEM_EVALUATION_METHOD_DEFINITION_AI_SAST"`.
  - Use exploit reproduction for prioritization and validation planning while redacting concrete exploit strings from review-facing
    output.
  - Treat remediation guidance as advisory evidence and verify source locations before proposing patches.
fallbacks:
  - If project or finding lookup fails, retry eligible project discovery with traversal and keep source findings separate
    from PR or CI context.
  - If source files, exploit reproduction, or remediation guidance are unavailable, continue only with verified evidence and
    mark the missing signal.
data_gaps:
  - Record missing credentials, namespace conflicts, project lookup gaps, absent finding evidence, missing source files, and
    optional exception-policy lookup failures in `data_gaps`.
  - Preserve `namespace_provenance`, source ref, finding UUID, stable exception_match, and context scope in remediation and exception outputs.
  - Final JSON fields must use concise evidence summaries, not raw `endorctl agent api --agent-id <agent-id>`, `git`, `gh`, `curl`, or shell pipeline
    strings. Keep exact commands in tool execution only.
evidence_query_plans:
  - profile_id: resolve-scope
    title: AI SAST Scope Query Plan
    objective: Resolve namespace, project, finding selector, and source ref before reading finding bodies.
    query_order:
      - Read user-provided finding UUID, repository identity, branch/ref, and namespace provenance.
      - If a Finding UUID is provided, get that Finding first and confirm project_uuid, context.type, and source_code_version.ref.
      - Fetch Project by the Finding's project UUID only when repository identity is absent; without a Finding UUID, resolve
        Project by the scoped repository selector.
    avoid:
      - Do not list broad AI SAST findings when the user supplied a specific finding UUID.
      - Do not mix CI/PR finding evidence into main-context counts unless requested.
    stop_after:
      - Stop when finding scope is resolved or a data_gaps entry explains which selector is missing.
    data_gaps:
      - Record missing namespace, missing finding UUID or selector, unresolved project, and source ref mismatch in data_gaps.
  - profile_id: evidence-check
    title: AI SAST Evidence Query Plan
    objective: Confirm AI SAST evidence and pinned source context without generating a patch.
    query_order:
      - With a supplied Finding UUID, query that Finding UUID first and derive project UUID, context type, source ref, and any
        repository identity already present in the returned evidence.
      - Fetch Project by the returned project UUID only when the Finding evidence does not establish repository identity.
      - With no Finding UUID, resolve Project once by repository selector, then run the main-context AI SAST count query.
    avoid:
      - Do not fetch unrelated SAST finding bodies or inspect the whole repository.
      - Do not list Finding inventories or fetch explanations, exploit evidence, remediation guidance, or source in this profile.
      - Treat Finding `spec.source_code_version.ref` as source-ref provenance, not proof of the repository default branch.
      - Do not create exception policies, branches, or source edits.
    stop_after:
      - Stop after exact Finding scope and conditional repository labeling are known, or after the project-scoped count is known
        when no Finding UUID was supplied.
    data_gaps:
      - Record missing finding body, missing selected Finding UUID, missing exploit/remediation sections, source ref mismatch,
        unavailable file, and host-blocked Endor reads in data_gaps.
  - profile_id: selection-plan
    title: AI SAST Selection Query Plan
    objective: Choose one actionable AI SAST finding and produce a read-only triage/remediation plan.
    query_order:
      - Resolve namespace, project, and requested finding selector.
      - Get or narrowly list all main-context AI SAST findings with severity, classification, source path, source ref,
        finding UUID, tight fields, and `--list-all`.
      - Fetch and parse detail only for the selected finding.
      - Inspect only the selected source file, sibling control files, and referenced data-flow anchors.
    avoid:
      - Do not generate diffs or exception policies unless the user explicitly approves that lane.
      - Do not use broad repository search beyond the selected finding's anchors unless data_gaps require it.
    stop_after:
      - Stop after one finding has a verified triage decision, patch plan or exception path, and validation requirements.
    data_gaps:
      - Record missing selected finding evidence, missing source ref, unavailable local files, and unverified exception approval
        in data_gaps.
evidence_query_recipes:
  - id: project-by-git
    canonical_id: project-by-git
    resource: Project
    purpose: Resolve the current repository to a namespace-scoped Endor project with only identity fields.
    template: endorctl agent api --agent-id <agent-id> list -r Project -n <namespace> --filter 'spec.git.full_name=="<owner/repo>"' --page-size 2 --field-mask "uuid,meta.name,meta.parent_uuid,spec.git" -o json
    fields:
      - uuid
      - meta.name
      - meta.parent_uuid
      - spec.git
    constraints:
      - Use the namespace selected by the preflight.
      - Retry with --traverse only for the same proven namespace before reporting data_gaps.
    profile_id: resolve-scope
  - profile_id: resolve-scope
    id: finding-by-uuid
    canonical_id: finding-by-uuid
    resource: Finding
    purpose: Fetch one known Finding by UUID; api get does not accept filters.
    template: endorctl agent api --agent-id <agent-id> get -r Finding -n <namespace> --uuid <FINDING_UUID> -o json
    fields:
      - uuid
      - context.type
      - spec.project_uuid
      - spec.source_code_version
      - spec.finding_metadata
      - spec.explanation
    constraints:
      - Do not use --filter with api get.
      - After get, report context.type and source ref before merging with project counts.
  - profile_id: resolve-scope
    id: project-by-uuid
    canonical_id: project-by-uuid
    resource: Project
    purpose: Fetch one exact Project for repository labeling only when a known Finding supplies the project UUID.
    template: endorctl agent api --agent-id <agent-id> get -r Project -n <namespace> --uuid <PROJECT_UUID> --field-mask "uuid,meta.name,meta.parent_uuid,spec.git" -o json
    fields:
      - uuid
      - meta.name
      - meta.parent_uuid
      - spec.git
    constraints:
      - Run only when the Finding evidence does not establish repository identity.
      - Preserve the Finding as project UUID provenance and do not treat its source ref as default-branch proof.
  - profile_id: evidence-check
    id: finding-by-uuid
    canonical_id: finding-by-uuid
    resource: Finding
    purpose: Fetch one known Finding by UUID; api get does not accept filters.
    template: endorctl agent api --agent-id <agent-id> get -r Finding -n <namespace> --uuid <FINDING_UUID> -o json
    fields:
      - uuid
      - context.type
      - spec.project_uuid
      - spec.source_code_version
      - spec.finding_metadata
      - spec.explanation
    constraints:
      - Do not use --filter with api get.
      - Query this recipe first when a Finding UUID is supplied.
      - Report context.type and source ref; the source ref is not proof of the repository default branch.
  - profile_id: evidence-check
    id: project-by-uuid
    canonical_id: project-by-uuid
    resource: Project
    purpose: Fetch one exact Project for repository labeling only when a known Finding supplies the project UUID.
    template: endorctl agent api --agent-id <agent-id> get -r Project -n <namespace> --uuid <PROJECT_UUID> --field-mask "uuid,meta.name,meta.parent_uuid,spec.git" -o json
    fields:
      - uuid
      - meta.name
      - meta.parent_uuid
      - spec.git
    constraints:
      - Run only when the Finding evidence does not establish repository identity.
      - Preserve the Finding as project UUID provenance and do not treat its source ref as default-branch proof.
  - profile_id: evidence-check
    id: project-by-git
    canonical_id: project-by-git
    resource: Project
    purpose: Resolve repository identity once when no Finding UUID was supplied.
    template: endorctl agent api --agent-id <agent-id> list -r Project -n <namespace> --filter 'spec.git.full_name=="<owner/repo>"' --page-size 2 --field-mask "uuid,meta.name,meta.parent_uuid,spec.git" -o json
    fields:
      - uuid
      - meta.name
      - meta.parent_uuid
      - spec.git
    constraints:
      - Use only when no Finding UUID was supplied.
      - Retry with --traverse only for the same proven namespace before reporting data_gaps.
  - profile_id: evidence-check
    id: ai-sast-count
    canonical_id: ai-sast-count
    resource: Finding
    purpose: Count AI SAST finding availability for a resolved project when no Finding UUID was supplied.
    template: endorctl agent api --agent-id <agent-id> list -r Finding -n <namespace> --filter 'context.type==CONTEXT_TYPE_MAIN and spec.project_uuid=="<PROJECT_UUID>" and spec.method=="SYSTEM_EVALUATION_METHOD_DEFINITION_AI_SAST"' --count -o json
    fields:
      - count
    constraints:
      - Use only when no Finding UUID was supplied and one project UUID plus namespace provenance is resolved.
      - Stop after availability is known; do not fetch metadata, explanations, or source bodies.
  - profile_id: selection-plan
    id: selected-ai-sast-finding
    canonical_id: finding-by-uuid
    resource: Finding
    purpose: Fetch one known Finding by UUID; api get does not accept filters.
    template: endorctl agent api --agent-id <agent-id> get -r Finding -n <namespace> --uuid <FINDING_UUID> -o json
    fields:
      - uuid
      - context.type
      - spec.project_uuid
      - spec.source_code_version
      - spec.finding_metadata
      - spec.explanation
    constraints:
      - Do not use --filter with api get.
      - After get, report context.type and source ref before merging with project counts.
  - profile_id: selection-plan
    id: selected-source-anchors
    canonical_id: selected-source-usage
    resource: local-files
    purpose: Inspect only selected package usage for compatibility and validation planning.
    template: rg -n '<PACKAGE_NAME>|<IMPORT_OR_SYMBOL>' <SELECTED_MANIFEST_OR_SOURCE_DIR>
    fields:
      - file
      - line
      - symbol
      - selected_package
    constraints:
      - Run only after one package is selected.
      - Do not scan unrelated source trees when the profile only needs a gate result.
