agent_id: sca-remediation
title: SCA Remediation Evidence Contract
summary: Use namespace-scoped project, Finding, and VersionUpgrade evidence before recommending or preparing any remediation branch.
resources:
  - name: Project
    purpose: Resolve the repository-scoped project UUID, selected namespace, and parent namespace traversal evidence.
    fields:
      - uuid
      - meta.name
      - meta.parent_uuid
      - spec.git
  - name: Finding
    purpose: Query only main-context vulnerability findings by default and preserve finding UUID, target package, advisory, severity, and dependency file paths.
    fields:
      - uuid
      - context.type
      - spec.project_uuid
      - spec.finding_categories
      - spec.target_uuid
      - spec.dependency_file_paths
  - name: VersionUpgrade
    purpose: Verify UIA/CIA upgrade evidence before making low-risk or compatibility claims.
    fields:
      - uuid
      - meta.parent_uuid
      - spec.upgrade_info
      - spec.upgrade_impact
retrieval_steps:
  - Inspect supplied context manifests or local `.endorlabs-context` snapshots first and verify their namespace, project UUID, and freshness.
  - Resolve project identity before Finding or VersionUpgrade lookups; never ask the user for a project UUID as the default path.
  - Query `Finding` with `context.type==CONTEXT_TYPE_MAIN` unless the user explicitly asks for PR, CI, or all-context findings.
  - Query `VersionUpgrade` for each candidate upgrade before labeling risk or choosing the first remediation branch.
fallbacks:
  - If the first project lookup misses, retry the same namespace-scoped lookup with traversal before declaring a project gap.
  - If UIA/CIA evidence is unavailable, keep the candidate plan-only or require compatibility validation instead of calling it low risk.
  - A runtime QA or plan-only gate is not complete unless the final answer includes one parseable JSON object with `project_resolution`, `selected_remediation`, `uia_evidence`, `risk_decision`, and `data_gaps`.
  - Even when mutation is not approved, include `selected_remediation.branch_name`, `risk_decision.source_usage_summary`, `risk_decision.validation_requirements`, and `change_requests[].proposed_branch` when a remediation candidate is selected.
data_gaps:
  - Record missing credentials, namespace conflicts, project lookup failures, absent main-context findings, missing VersionUpgrade evidence, and unavailable source files in `data_gaps`.
  - Preserve `namespace_provenance`, project query attempts, and context scope in the final gate output.
  - Render `uia_evidence` as an array of VersionUpgrade/UIA records, not as a single object.
  - For elevated, indeterminate, conflicting, or introduced-finding candidates, include `risk_decision.source_usage_summary` and validation requirements instead of returning a prose-only risk summary.
