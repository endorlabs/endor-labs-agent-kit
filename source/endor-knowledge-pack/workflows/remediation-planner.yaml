agent_id: remediation-planner
title: Remediation Planner Evidence Contract
summary: Preview remediation options only from verified Endor findings and VersionUpgrade/UIA evidence; local project docs
  are context, not evidence.
task_profiles:
  - id: resolve-scope
    title: Resolve Scope
    summary: Prove namespace, repository, and Endor project identity before planning.
    when_to_use:
      - The user asks whether a repository can be planned against Endor evidence.
      - Project resolution is missing or ambiguous.
    minimal_evidence:
      - Repository identity from current workspace or explicit user input.
      - Namespace provenance and Project lookup attempt.
    stop_when:
      - '`project_resolution.status` is resolved, unresolved, ambiguous, or lookup_unavailable.'
      - Do not report SCA counts or options in this profile.
    output_focus:
      - Return `project_resolution`, `evidence_queries`, and `data_gaps` without remediation options.
  - id: evidence-check
    title: Evidence Check
    summary: Check whether verified Finding and VersionUpgrade/UIA evidence exists for planning.
    when_to_use:
      - The user asks why a plan cannot be trusted or whether remediation evidence exists.
      - The request is exploratory and does not require a selected option.
    minimal_evidence:
      - Resolved project and namespace.
      - One scoped Finding query and one scoped VersionUpgrade/UIA query, or data_gaps for each unavailable lane.
    stop_when:
      - Evidence availability is known and unproven local counts are rejected.
      - Do not estimate counts, risk, review time, or touched files from local docs.
    output_focus:
      - Return evidence availability, empty or verified `remediation_options`, and precise `data_gaps`.
  - id: selection-plan
    title: Selection Plan
    summary: Preview one or more verified remediation options without editing files.
    when_to_use:
      - The user asks for a remediation plan or ranked options.
      - The host needs a read-only planning gate.
    minimal_evidence:
      - Resolved project, Finding evidence, VersionUpgrade/UIA evidence, and affected manifest context for each named option.
    stop_when:
      - Verified options are ranked, or missing evidence blocks selection.
      - Do not mutate files, create branches, or open change requests.
    output_focus:
      - Return `remediation_options`, optional `selected_remediation`, `evidence_queries`, and `data_gaps`.
resources:
  - name: Project
    purpose: Resolve repository-scoped project identity and namespace provenance before any remediation option.
    fields:
      - uuid
      - meta.name
      - spec.git
  - name: Finding
    purpose: Identify project-scoped vulnerability findings and affected packages without fabricating counts.
    fields:
      - uuid
      - context.type
      - spec.project_uuid
      - spec.finding_categories
      - spec.target_uuid
      - spec.dependency_file_paths
  - name: VersionUpgrade
    purpose: Read UIA/CIA remediation candidates, risk, fixed findings, introduced findings, and manifest targets.
    fields:
      - uuid
      - spec.upgrade_info
retrieval_steps:
  - Resolve namespace and project with provenance before reporting any finding count, remediation count, or selected option.
  - Treat repository files, project docs, CLAUDE.md, README content, and local paths as unverified context until Endor evidence
    or user-provided evidence confirms them.
  - For selection plans, query VersionUpgrade/UIA summaries before detailed Finding expansion; use narrow Finding availability
    or detail only when the profile requires it.
fallbacks:
  - If project resolution is missing, return `project_resolution.status` as `unresolved` and stop at data_gaps.
  - If Finding or VersionUpgrade evidence is unavailable, return plan-only insufficient evidence and do not estimate counts,
    risk, review time, or touched files.
data_gaps:
  - Record missing namespace, project resolution, Finding evidence, VersionUpgrade/UIA evidence, source-provider metadata,
    and host command capability in `data_gaps`.
  - Preserve `project_resolution.status`, `namespace_provenance`, query attempts, and context scope in the final output.
evidence_query_plans:
  - profile_id: resolve-scope
    title: Resolve Scope Query Plan
    objective: Resolve the repository to a namespace-scoped Endor project and stop before remediation evidence.
    query_order:
      - Read current repository identity or user-provided selectors.
      - Resolve namespace provenance from the current request, environment, or default config key extraction.
      - Query Project with a tight field mask and record attempted selectors.
    avoid:
      - Do not query Finding, VersionUpgrade, package, or dependency evidence before project scope is proven.
    stop_after:
      - Stop after project_resolution.status is resolved, ambiguous, unresolved, or lookup_unavailable.
    data_gaps:
      - Record missing namespace, unresolved project selectors, and host-blocked Endor reads in data_gaps.
  - profile_id: evidence-check
    title: Planner Evidence Query Plan
    objective: Verify remediation evidence availability without choosing a preferred option.
    query_order:
      - Resolve namespace and project first.
      - Query scoped VersionUpgrade/UIA summaries for candidate availability, risk, CIA, and manifest fields.
      - Query narrow main-context Finding availability only to confirm finding-backed remediation evidence.
    avoid:
      - Do not trust local docs, repository paths, or remembered counts as remediation_options.
      - Do not inspect source usage or draft a PR plan unless selection is requested.
    stop_after:
      - Stop after remediation evidence lanes are proven available or unavailable.
    data_gaps:
      - Record missing Finding evidence, missing VersionUpgrade/UIA evidence, unresolved project scope, and unavailable host
        tools in data_gaps.
  - profile_id: selection-plan
    title: Planner Selection Query Plan
    objective: Preview verified remediation options by ranking VersionUpgrade/UIA before Finding detail expansion.
    query_order:
      - Resolve namespace and project first.
      - Query VersionUpgrade/UIA summaries for ranked remediation options with risk, CIA, findings fixed, findings introduced,
        and manifest fields.
      - Fetch detailed VersionUpgrade/UIA evidence only for selected or shortlisted options.
      - Query Finding detail only for selected option explanation, advisory mapping, or fixed-count reconciliation.
    avoid:
      - Do not enumerate broad Finding inventories as the default way to discover options.
      - Do not select remediation from local SCA counts, README claims, or cached notes.
    stop_after:
      - Stop after selected_remediation is null or backed by verified remediation_options and precise data_gaps.
    data_gaps:
      - Record skipped Finding detail, missing UIA/CIA fields, unverified counts, and unavailable project evidence in data_gaps.
