<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Geist, sans-serif">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#0a3d2c" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#000503" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="82%" cy="100%" r="65%">
      <stop offset="0%" stop-color="#1a2f5e" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#000503" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1518" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#0a1112" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="cardGlassActive" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e2023" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#091517" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="hairline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3fe1f3" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3fe1f3" stop-opacity="0.64"/>
      <stop offset="100%" stop-color="#3fe1f3" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hairlineGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f078" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f078" stop-opacity="0.64"/>
      <stop offset="100%" stop-color="#00f078" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hairlinePurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9f69f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9f69f7" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#9f69f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.42"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3fe1f3"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00f078"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9f69f7"/>
    </marker>
  </defs>

  <rect width="1280" height="700" fill="#000503"/>
  <rect width="1280" height="700" fill="url(#bgGlow)"/>
  <rect width="1280" height="700" fill="url(#bgGlow2)"/>

  <g transform="translate(40, 34)">
    <text x="0" y="26" font-size="25" font-weight="700" fill="#e5f6f7">Dependency Reviewer - Bounded Profile Agent</text>
    <text x="0" y="53" font-size="13" fill="#9fb4be">One request to one profile to minimal dependency evidence to structured review</text>
    <text x="0" y="75" font-size="11" fill="#7c93a0">Package decision, package risk, and repository review share evidence rules without loading or invoking three separate agents.</text>
  </g>

  <g transform="translate(40, 148)">
    <g filter="url(#cardShadow)">
      <rect width="200" height="136" rx="12" fill="url(#cardGlass)" stroke="#17323a"/>
      <rect x="20" y="0" width="160" height="2" fill="url(#hairline)"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#3fe1f3" letter-spacing="1.4">INPUT</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#e5f6f7">Task Request</text>
      <text x="20" y="88" font-size="12" fill="#9fb4be">exact package</text>
      <text x="20" y="108" font-size="12" fill="#9fb4be">or repository</text>
    </g>
    <line x1="212" y1="68" x2="260" y2="68" stroke="#3fe1f3" stroke-width="1.4" marker-end="url(#arrowCyan)"/>

    <g transform="translate(278,0)" filter="url(#cardShadow)">
      <rect width="200" height="136" rx="12" fill="url(#cardGlassActive)" stroke="#1c5360"/>
      <rect x="20" y="0" width="160" height="2" fill="url(#hairlineGreen)"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#00f078" letter-spacing="1.4">ROUTE</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#e5f6f7">One Profile</text>
      <text x="20" y="88" font-size="12" fill="#9fb4be">decision or risk</text>
      <text x="20" y="108" font-size="12" fill="#9fb4be">or repository review</text>
    </g>
    <line x1="490" y1="68" x2="538" y2="68" stroke="#00f078" stroke-width="1.4" marker-end="url(#arrowGreen)"/>

    <g transform="translate(556,0)" filter="url(#cardShadow)">
      <rect width="200" height="136" rx="12" fill="url(#cardGlass)" stroke="#17323a"/>
      <rect x="20" y="0" width="160" height="2" fill="url(#hairlinePurple)"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#9f69f7" letter-spacing="1.4">EVIDENCE</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#e5f6f7">Bounded Evidence</text>
      <text x="20" y="88" font-size="12" fill="#9fb4be">exact PackageVersion</text>
      <text x="20" y="108" font-size="12" fill="#9fb4be">or selected manifests</text>
    </g>
    <line x1="768" y1="68" x2="816" y2="68" stroke="#9f69f7" stroke-width="1.4" marker-end="url(#arrowPurple)"/>

    <g transform="translate(834,0)" filter="url(#cardShadow)">
      <rect width="200" height="136" rx="12" fill="url(#cardGlass)" stroke="#17323a"/>
      <rect x="20" y="0" width="160" height="2" fill="url(#hairline)"/>
      <text x="20" y="34" font-size="11" font-weight="700" fill="#3fe1f3" letter-spacing="1.4">EVALUATE</text>
      <text x="20" y="62" font-size="18" font-weight="700" fill="#e5f6f7">Profile Contract</text>
      <text x="20" y="88" font-size="12" fill="#9fb4be">one decision ladder</text>
      <text x="20" y="108" font-size="12" fill="#9fb4be">no agent fan-out</text>
    </g>
    <line x1="1046" y1="68" x2="1062" y2="68" stroke="#3fe1f3" stroke-width="1.4" marker-end="url(#arrowCyan)"/>

    <g transform="translate(1074,0)" filter="url(#cardShadow)">
      <rect width="126" height="136" rx="12" fill="url(#cardGlassActive)" stroke="#1f6540"/>
      <rect x="18" y="0" width="90" height="2" fill="url(#hairlineGreen)"/>
      <text x="18" y="34" font-size="11" font-weight="700" fill="#00f078" letter-spacing="1.4">RESULT</text>
      <text x="18" y="62" font-size="15" font-weight="700" fill="#e5f6f7">Review</text>
      <text x="18" y="82" font-size="15" font-weight="700" fill="#e5f6f7">JSON</text>
      <text x="18" y="108" font-size="12" fill="#9fb4be">read-only</text>
    </g>
  </g>

  <g transform="translate(70, 342)">
    <g filter="url(#cardShadow)">
      <rect width="350" height="170" rx="12" fill="url(#cardGlass)" stroke="#17323a"/>
      <rect x="24" y="0" width="302" height="2" fill="url(#hairline)"/>
      <text x="24" y="34" font-size="11" font-weight="700" fill="#3fe1f3" letter-spacing="1.5">PROFILE ROUTING</text>
      <text x="24" y="64" font-size="18" font-weight="700" fill="#e5f6f7">One Intent, One Profile</text>
      <text x="24" y="94" font-size="12" fill="#9fb4be">- package-decision for adoption questions</text>
      <text x="24" y="118" font-size="12" fill="#9fb4be">- package-risk for evidence summaries</text>
      <text x="24" y="142" font-size="12" fill="#9fb4be">- repository-review for manifests</text>
    </g>

    <g transform="translate(395,0)" filter="url(#cardShadow)">
      <rect width="390" height="170" rx="12" fill="url(#cardGlassActive)" stroke="#1c5360"/>
      <rect x="24" y="0" width="342" height="2" fill="url(#hairlineGreen)"/>
      <text x="24" y="34" font-size="11" font-weight="700" fill="#00f078" letter-spacing="1.5">RUNTIME BOUNDARY</text>
      <text x="24" y="64" font-size="18" font-weight="700" fill="#e5f6f7">Minimal Evidence</text>
      <text x="24" y="94" font-size="12" fill="#9fb4be">- exact coordinate before package lookup</text>
      <text x="24" y="118" font-size="12" fill="#9fb4be">- manifests only for repository-review</text>
      <text x="24" y="142" font-size="12" fill="#9fb4be">- stop on evidence or explicit gaps</text>
    </g>

    <g transform="translate(830,0)" filter="url(#cardShadow)">
      <rect width="350" height="170" rx="12" fill="url(#cardGlass)" stroke="#17323a"/>
      <rect x="24" y="0" width="302" height="2" fill="url(#hairlinePurple)"/>
      <text x="24" y="34" font-size="11" font-weight="700" fill="#9f69f7" letter-spacing="1.5">SAFETY RULES</text>
      <text x="24" y="64" font-size="18" font-weight="700" fill="#e5f6f7">Review Means Read-Only</text>
      <text x="24" y="94" font-size="12" fill="#9fb4be">- no file edits or package installs</text>
      <text x="24" y="118" font-size="12" fill="#9fb4be">- no scans, policies, or PR/MR creation</text>
      <text x="24" y="142" font-size="12" fill="#9fb4be">- one profile-specific JSON object</text>
    </g>
  </g>

  <g transform="translate(70, 575)">
    <rect width="1140" height="78" rx="12" fill="#071012" stroke="#17323a"/>
    <rect x="30" y="0" width="1080" height="2" fill="url(#hairlineGreen)"/>
    <text x="30" y="34" font-size="12" font-weight="700" fill="#00f078" letter-spacing="1.5">PUBLISHED CONTRACT</text>
    <text x="30" y="58" font-size="13" fill="#cfe4e8">Dependency Reviewer preserves three legacy workflows through one canonical identity, bounded profiles, exact evidence, and explicit legacy aliases.</text>
  </g>
</svg>
